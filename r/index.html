<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. CHANGE THE URL BELOW (The number 0 is the delay in seconds) -->
    <meta http-equiv="refresh" content="0; url=http://192.168.68.124:5000">
    
    <title>Redirecting...</title>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --accent-color: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 400px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #64748b;
            font-size: 0.9rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting you</h1>
        <p>If you are not redirected automatically, <br> 
           <a id="manual-link" href="http://192.168.68.124:5000">click here</a>.
        </p>
    </div>

    <script>
        // 2. CHANGE THE URL BELOW AS WELL
        const destination = "https://your-destination-url.com";

        // JavaScript Fallback Redirect
        window.location.href = destination;

        // Update the manual link just in case
        document.getElementById('manual-link').href = destination;
    </script>
</body>
</html>
