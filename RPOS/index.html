<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurant POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Floating Logo Animation for Screensaver */
        @keyframes float {
            0% { transform: translate(0, 0); }
            25% { transform: translate(30vw, 15vh); }
            50% { transform: translate(60vw, 0); }
            75% { transform: translate(30vw, -15vh); }
            100% { transform: translate(0, 0); }
        }
        .screensaver-logo {
            animation: float 25s linear infinite alternate;
            max-width: 250px;
            max-height: 250px;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Smooth Screen Transitions */
        .fade-enter {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 80mm Receipt Printing Styles */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                margin: 0;
                padding: 4mm;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
                line-height: 1.2;
                color: black;
                display: block !important;
            }
            @page { margin: 0; size: 80mm auto; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern Glass Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Mobile Touch Optimizations */
        button:active { transform: scale(0.96); }
        input { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden flex flex-col font-sans">

    <!-- CONFIGURATION -->
    <script>
        const NGROK_URL = "https://habile-lissa-phytogenic.ngrok-free.dev";
    </script>

    <!-- Main Content Area -->
    <div id="app" class="flex-1 overflow-hidden relative flex flex-col fade-enter">
        <div class="flex items-center justify-center h-full bg-slate-900 text-white">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-6"></div>
                <p class="text-xl font-light tracking-[0.4em] uppercase opacity-60">Initializing Ramen OS</p>
            </div>
        </div>
    </div>

    <!-- Status Bar (Persistent) -->
    <div id="status-bar" class="bg-slate-950 text-[10px] text-slate-500 px-6 py-2 flex justify-between uppercase tracking-[0.2em] border-t border-slate-800 z-[60]">
        <div class="flex items-center gap-2">
            <div id="status-indicator" class="h-2 w-2 rounded-full bg-yellow-500"></div>
            <span id="net-status">Syncing...</span>
        </div>
        <div class="font-bold text-blue-400" id="device-tag">SYSTEM IDLE</div>
    </div>

    <!-- Hidden Print Buffer -->
    <div id="print-area" style="display:none;"></div>

    <!-- Toast Notifications -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 translate-y-[-200%] opacity-0">
        <div class="bg-slate-900 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-4 border border-slate-700">
            <span id="toast-icon" class="text-xl">✨</span>
            <span id="toast-text" class="font-black tracking-tight">System Message</span>
        </div>
    </div>

    <script>
        // --- APP STATE ---
        let socket;
        let currentRole = null;
        let currentScreen = 'role-selection';
        let state = { 
            customers: [], 
            menu: [], 
            modifiers: [],
            settings: { restaurantName: "RAMEN POS", logoUrl: "" } 
        };
        let orderContext = { activeCustomerId: null, category: null, cart: [], pendingItem: null };

        // --- NETWORK ENGINE ---
        function connectToServer() {
            socket = io(NGROK_URL, { transports: ['websocket'], reconnection: true });
            
            socket.on('connect', () => {
                document.getElementById('net-status').innerText = "Online";
                document.getElementById('status-indicator').className = "h-2 w-2 rounded-full bg-green-500";
            });

            socket.on('disconnect', () => {
                document.getElementById('net-status').innerText = "Disconnected";
                document.getElementById('status-indicator').className = "h-2 w-2 rounded-full bg-red-500 animate-pulse";
            });

            socket.on('sync_state', (newState) => {
                state = newState;
                render();
            });

            socket.on('kitchen_print_order', (data) => {
                if (currentRole === 'kitchen') handleKitchenPrint(data.customerName, data.items);
            });
        }

        // --- NAVIGATION & ROUTING ---
        function render() {
            const app = document.getElementById('app');
            app.classList.remove('fade-enter');
            void app.offsetWidth;
            app.classList.add('fade-enter');

            if (!currentRole) return renderRoleSelection(app);

            if (currentRole === 'ordering') {
                if (currentScreen === 'customer-list') renderOrderingList(app);
                else if (currentScreen === 'menu') renderOrderingMenu(app);
            } else if (currentRole === 'kitchen') {
                if (currentScreen === 'screensaver') renderKitchenScreensaver(app);
                else if (currentScreen === 'password') renderKitchenPassword(app);
                else if (currentScreen === 'dashboard') renderKitchenDashboard(app);
                else if (currentScreen === 'settings') renderKitchenSettings(app);
            }
        }

        // --- VIEW: ROLE SELECTION ---
        function renderRoleSelection(container) {
            container.innerHTML = `
            <div class="h-full flex flex-col items-center justify-center bg-slate-900 text-white p-10">
                <div class="mb-16 text-center">
                    <h1 class="text-6xl font-black italic tracking-tighter mb-4">RAMEN <span class="text-blue-500">POS</span></h1>
                    <div class="h-1.5 w-24 bg-blue-500 mx-auto rounded-full"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-3xl">
                    <button onclick="setDeviceRole('ordering')" class="bg-blue-600 p-10 rounded-[3rem] shadow-2xl transition-all hover:-translate-y-2 text-left group">
                        <span class="text-5xl block mb-6">📱</span>
                        <span class="text-3xl font-black block mb-2">Ordering</span>
                        <span class="text-blue-200 text-sm opacity-60 font-medium">Handheld Customer Terminal</span>
                    </button>
                    <button onclick="setDeviceRole('kitchen')" class="bg-red-600 p-10 rounded-[3rem] shadow-2xl transition-all hover:-translate-y-2 text-left group">
                        <span class="text-5xl block mb-6">🍳</span>
                        <span class="text-3xl font-black block mb-2">Kitchen</span>
                        <span class="text-red-200 text-sm opacity-60 font-medium">Management & Printing</span>
                    </button>
                </div>
            </div>`;
        }

        function setDeviceRole(role) {
            currentRole = role;
            document.getElementById('device-tag').innerText = role.toUpperCase();
            currentScreen = (role === 'ordering') ? 'customer-list' : 'screensaver';
            connectToServer();
            render();
        }

        // --- VIEW: ORDERING (MOBILE OPTIMIZED) ---
        function renderOrderingList(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-white">
                <header class="p-6 bg-white flex justify-between items-center border-b">
                    <h2 class="text-2xl font-black italic">RAMEN <span class="text-blue-500">POS</span></h2>
                    <button onclick="currentRole=null; render()" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Logout</button>
                </header>
                <div class="p-6 bg-slate-50 border-b">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-4">New Order Session</p>
                    <div class="flex gap-2">
                        <input id="new-cust-input" type="text" placeholder="Table # or Name" class="flex-1 p-4 rounded-2xl border-2 border-slate-100 focus:border-blue-500 outline-none font-bold shadow-inner">
                        <button onclick="handleAddCustomer()" class="bg-blue-600 text-white w-14 rounded-2xl font-black text-2xl shadow-lg shadow-blue-100">+</button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-6 space-y-4">
                    ${state.customers.map(c => `
                        <div class="flex items-center gap-3">
                            <button onclick="openOrderingMenu('${c.id}')" class="flex-1 bg-white p-6 rounded-[2.5rem] border-2 border-slate-50 shadow-sm flex justify-between items-center text-left active:bg-blue-50 transition-all">
                                <div>
                                    <span class="block text-2xl font-black text-slate-800">${c.name}</span>
                                    <span class="text-xs font-bold text-slate-400 uppercase">${c.orders.length} Items Pending</span>
                                </div>
                                <div class="h-10 w-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 font-black">&rarr;</div>
                            </button>
                            <button onclick="handleDeleteCustomer('${c.id}')" class="h-14 w-14 bg-red-50 text-red-400 rounded-3xl font-black text-2xl active:bg-red-500 active:text-white transition-all">&times;</button>
                        </div>
                    `).join('')}
                    ${state.customers.length === 0 ? '<div class="text-center py-20 text-slate-300 italic font-medium">No active sessions. Add one above.</div>' : ''}
                </div>
            </div>`;
        }

        function renderOrderingMenu(container) {
            const customer = state.customers.find(c => c.id === orderContext.activeCustomerId);
            if (!customer) { currentScreen = 'customer-list'; render(); return; }
            
            if (!orderContext.category && state.menu.length > 0) orderContext.category = state.menu[0].category;
            const activeCat = state.menu.find(m => m.category === orderContext.category);

            container.innerHTML = `
            <div class="flex flex-col h-full bg-white relative">
                <header class="p-4 bg-white border-b flex items-center justify-between z-50">
                    <button onclick="currentScreen='customer-list'; render()" class="h-10 w-10 flex items-center justify-center bg-slate-100 rounded-xl font-black">&larr;</button>
                    <div class="text-center">
                        <span class="block font-black text-lg">${customer.name}</span>
                        <span class="text-[10px] text-blue-500 font-black uppercase tracking-widest">Active Order</span>
                    </div>
                    <div class="w-10"></div>
                </header>

                <div class="flex overflow-x-auto p-3 gap-2 no-scrollbar bg-slate-50 border-b sticky top-0 z-40">
                    ${state.menu.map(m => `
                        <button onclick="orderContext.category='${m.category}'; render()" class="px-6 py-3 rounded-2xl font-black text-sm whitespace-nowrap transition-all ${orderContext.category === m.category ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-400 border border-slate-200'}">
                            ${m.category.toUpperCase()}
                        </button>
                    `).join('')}
                </div>

                <div class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 content-start pb-40">
                    ${(activeCat?.items || []).map(item => `
                        <button onclick="triggerModifierCheck('${item.name}', ${item.price})" class="bg-white border-2 border-slate-100 p-5 rounded-[2rem] text-left h-40 flex flex-col justify-between shadow-sm active:scale-95 transition-all">
                            <span class="font-black text-slate-800 text-lg leading-tight">${item.name}</span>
                            <span class="text-blue-600 font-black text-xl">$${item.price.toFixed(2)}</span>
                        </button>
                    `).join('')}
                </div>

                <!-- Footer Cart Drawer -->
                <div class="absolute bottom-0 left-0 right-0 glass-panel p-6 border-t-2 border-slate-100 rounded-t-[3rem] shadow-[0_-15px_40px_rgba(0,0,0,0.05)] z-[60]">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div>
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Selection</span>
                            <p class="font-black text-2xl">${orderContext.cart.length} Items</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Total</span>
                            <p class="font-black text-2xl text-green-600">$${orderContext.cart.reduce((s,i)=>s+i.price,0).toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="submitOrderToKitchen()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-2xl active:bg-blue-600 active:scale-95 transition-all disabled:opacity-20" ${orderContext.cart.length === 0 ? 'disabled' : ''}>SEND TO KITCHEN</button>
                </div>

                ${orderContext.pendingItem ? renderModifierPopup() : ''}
            </div>`;
        }

        function renderModifierPopup() {
            const applicableMods = (state.modifiers || []).filter(m => m.category === orderContext.category);
            if (applicableMods.length === 0) {
                setTimeout(() => finalizeAddItem(orderContext.pendingItem.name, orderContext.pendingItem.price), 10);
                return '';
            }

            return `
            <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[100] flex items-end sm:items-center justify-center p-4">
                <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl fade-enter">
                    <h3 class="text-3xl font-black text-slate-900 mb-2">Options</h3>
                    <p class="text-slate-400 font-bold mb-8">Personalize your ${orderContext.pendingItem.name}</p>
                    
                    <div class="space-y-8 max-h-[50vh] overflow-y-auto mb-10 pr-2">
                        ${applicableMods.map(mod => `
                            <div>
                                <h4 class="text-[10px] font-black uppercase text-blue-500 tracking-[0.2em] mb-4">${mod.name}</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    ${mod.options.map(opt => `
                                        <button onclick="finalizeAddItem('${orderContext.pendingItem.name} (${opt.name})', ${orderContext.pendingItem.price + opt.price})" class="bg-slate-50 p-5 rounded-3xl border-2 border-transparent hover:border-blue-500 text-left transition-all group">
                                            <span class="block font-black text-slate-700 group-hover:text-blue-600">${opt.name}</span>
                                            <span class="text-xs font-bold text-slate-400">+$${opt.price.toFixed(2)}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="finalizeAddItem(orderContext.pendingItem.name, orderContext.pendingItem.price)" class="w-full border-2 border-dashed border-slate-200 p-5 rounded-[2rem] text-slate-400 font-black text-sm uppercase tracking-widest">Add Regular Item</button>
                    </div>
                    <button onclick="orderContext.pendingItem = null; render()" class="w-full py-2 text-slate-300 font-black text-xs uppercase tracking-[0.3em]">Cancel</button>
                </div>
            </div>`;
        }

        // --- VIEW: KITCHEN (FULL FEATURES RESTORED) ---
        function renderKitchenScreensaver(container) {
            container.innerHTML = `
            <div onclick="currentScreen='password'; render()" class="h-full w-full bg-slate-950 flex items-center justify-center cursor-pointer overflow-hidden relative">
                <img src="${state.settings.logoUrl || 'https://via.placeholder.com/300?text=LOGO'}" class="screensaver-logo pointer-events-none">
                <div class="absolute bottom-16 text-slate-600 font-black uppercase tracking-[1em] text-[10px] animate-pulse">Touch Terminal to Start</div>
                <div class="absolute top-12 left-12 text-white opacity-20 font-black text-2xl italic tracking-tighter">${state.settings.restaurantName}</div>
            </div>`;
        }

        function renderKitchenPassword(container) {
            container.innerHTML = `
            <div class="h-full flex items-center justify-center bg-slate-900 p-6">
                <div class="bg-white rounded-[3rem] p-12 w-full max-w-sm shadow-[0_50px_100px_rgba(0,0,0,0.5)]">
                    <div class="text-center mb-10">
                        <div class="h-20 w-20 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-4xl">🔐</div>
                        <h2 class="text-3xl font-black text-slate-900">Secure Access</h2>
                        <p class="text-slate-400 font-medium">Enter terminal passcode</p>
                    </div>
                    <input id="pin-input" type="password" maxlength="4" placeholder="••••" class="w-full text-center text-6xl p-6 bg-slate-50 border-4 border-transparent focus:border-blue-500 rounded-[2rem] mb-8 tracking-[0.4em] focus:outline-none font-black text-slate-800">
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="handlePinSubmit()" class="bg-blue-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl shadow-blue-200">ENTER</button>
                        <button onclick="currentScreen='screensaver'; render()" class="bg-slate-100 text-slate-400 py-6 rounded-[2rem] font-black text-xl">CANCEL</button>
                    </div>
                </div>
            </div>`;
            setTimeout(() => { document.getElementById('pin-input').focus(); }, 100);
        }

        function renderKitchenDashboard(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-slate-50">
                <header class="bg-slate-950 p-8 text-white flex justify-between items-center shadow-2xl z-50">
                    <div class="flex items-center gap-6">
                        <div class="h-14 w-14 rounded-full bg-white p-1 overflow-hidden">
                            <img src="${state.settings.logoUrl || ''}" class="h-full w-full object-cover rounded-full">
                        </div>
                        <div>
                            <h1 class="font-black text-3xl tracking-tighter italic leading-none">${state.settings.restaurantName}</h1>
                            <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Active Kitchen Terminal</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="currentScreen='settings'; render()" class="bg-slate-800 hover:bg-slate-700 px-8 py-4 rounded-[1.5rem] font-black text-xs uppercase tracking-widest transition-all">System Manager</button>
                        <button onclick="currentScreen='screensaver'; render()" class="bg-red-900/30 text-red-400 border border-red-900/50 px-8 py-4 rounded-[1.5rem] font-black text-xs uppercase tracking-widest">Lock</button>
                    </div>
                </header>
                
                <div class="flex-1 overflow-y-auto p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10 content-start">
                    ${state.customers.map(c => {
                        const total = c.orders.reduce((acc, i) => acc + i.price, 0);
                        return `
                        <div class="bg-white rounded-[3rem] p-10 shadow-sm border-2 border-white hover:border-blue-100 hover:shadow-2xl transition-all flex flex-col h-[480px]">
                            <div class="mb-8">
                                <h3 class="text-4xl font-black text-slate-900 truncate mb-2">${c.name}</h3>
                                <div class="bg-slate-100 px-4 py-2 rounded-xl inline-block text-[10px] font-black uppercase text-slate-500 tracking-widest">${c.orders.length} Active Dishes</div>
                            </div>
                            <div class="flex-1 overflow-y-auto mb-8 space-y-3 pr-2 scrollbar-thin">
                                ${c.orders.map(o => `
                                    <div class="flex items-start gap-3 text-sm font-bold text-slate-600">
                                        <span class="text-blue-500 text-lg leading-none">•</span>
                                        <span>${o.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-auto border-t-4 border-slate-50 pt-8">
                                <div class="flex justify-between items-baseline mb-8">
                                    <span class="text-slate-400 text-xs font-black uppercase">Current Bill</span>
                                    <span class="text-4xl font-black text-green-600">$${total.toFixed(2)}</span>
                                </div>
                                <button onclick="handlePrintFinalReceipt('${c.id}')" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-sm shadow-xl active:scale-95 transition-all">CLOSE & PRINT BILL</button>
                            </div>
                        </div>`;
                    }).join('')}
                    ${state.customers.length === 0 ? '<div class="col-span-full py-40 text-center opacity-20"><span class="text-8xl block mb-6">🍜</span><p class="font-black text-5xl uppercase tracking-tighter italic">Kitchen is Idle</p></div>' : ''}
                </div>
            </div>`;
        }

        function renderKitchenSettings(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-white">
                <header class="p-10 border-b-4 border-slate-50 flex justify-between items-center bg-white sticky top-0 z-[60]">
                    <div>
                        <h2 class="text-5xl font-black tracking-tighter text-slate-900">System Management</h2>
                        <p class="text-slate-400 font-bold mt-2">Configure menu, branding, and modifiers</p>
                    </div>
                    <button onclick="currentScreen='dashboard'; render()" class="bg-blue-600 text-white px-10 py-5 rounded-[2rem] font-black shadow-2xl shadow-blue-100 transition-all active:scale-95">BACK TO TERMINAL</button>
                </header>
                
                <div class="flex-1 overflow-y-auto p-12 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-16">
                    
                    <!-- Branding -->
                    <div class="space-y-12">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-8 tracking-[0.4em]">Brand Identity</h3>
                            <div class="bg-slate-50 p-8 rounded-[3rem] space-y-6">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 block mb-3 ml-2">Restaurant Name</label>
                                    <input id="brand-name-input" type="text" value="${state.settings.restaurantName}" class="w-full p-5 bg-white rounded-2xl font-bold border-2 border-transparent focus:border-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 block mb-3 ml-2">Logo URL (PNG/JPG)</label>
                                    <input id="brand-logo-input" type="text" value="${state.settings.logoUrl}" class="w-full p-5 bg-white rounded-2xl font-bold border-2 border-transparent focus:border-blue-500 outline-none">
                                </div>
                                <button onclick="handleUpdateBranding()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm tracking-widest shadow-xl">SAVE BRANDING</button>
                            </div>
                        </section>
                    </div>

                    <!-- Menu Editor -->
                    <div class="space-y-12">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-8 tracking-[0.4em]">Menu Architecture</h3>
                            <div class="bg-blue-50 p-8 rounded-[3rem] border-2 border-blue-100 mb-10">
                                <label class="text-[10px] font-black uppercase text-blue-400 block mb-3 ml-2">Create New Category</label>
                                <div class="flex gap-2">
                                    <input id="new-cat-input" type="text" placeholder="e.g. Appetizers" class="flex-1 p-5 bg-white rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-200">
                                    <button onclick="handleAddCategory()" class="bg-blue-600 text-white px-8 rounded-2xl font-black text-xs">ADD</button>
                                </div>
                            </div>

                            <div class="space-y-8">
                                ${state.menu.map((cat, idx) => `
                                    <div class="bg-slate-50 p-8 rounded-[3rem]">
                                        <div class="flex justify-between items-center mb-6 border-b pb-4">
                                            <span class="font-black text-xl">${cat.category}</span>
                                            <button onclick="handleDeleteCategory(${idx})" class="text-red-400 font-black text-[10px] uppercase hover:text-red-600 transition-colors">Delete</button>
                                        </div>
                                        <div class="space-y-3 mb-8">
                                            ${cat.items.map((i, iIdx) => `
                                                <div class="flex justify-between bg-white p-4 rounded-2xl shadow-sm group">
                                                    <div class="flex items-center gap-3">
                                                        <button onclick="handleDeleteItem(${idx}, ${iIdx})" class="text-slate-300 hover:text-red-500">&times;</button>
                                                        <span class="font-bold text-slate-700">${i.name}</span>
                                                    </div>
                                                    <span class="font-black text-blue-600">$${i.price.toFixed(2)}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="bg-white p-3 rounded-[2rem] flex gap-2 border-2 border-slate-100 shadow-inner">
                                            <input id="i-n-${idx}" placeholder="Name" class="flex-1 text-sm font-bold outline-none pl-4">
                                            <input id="i-p-${idx}" type="number" step="0.01" placeholder="Price" class="w-20 text-sm font-bold outline-none">
                                            <button onclick="handleAddItem(${idx})" class="bg-green-500 text-white h-12 w-12 rounded-2xl font-black">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>

                    <!-- Modifier Editor -->
                    <div class="space-y-12">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-8 tracking-[0.4em]">Modifiers & Add-ons</h3>
                            <div class="bg-purple-50 p-8 rounded-[3rem] border-2 border-purple-100 mb-10 space-y-4">
                                <input id="mod-name-input" placeholder="Modifier Title (e.g. Pancake Sides)" class="w-full p-5 bg-white rounded-2xl font-bold outline-none">
                                <select id="mod-cat-select" class="w-full p-5 bg-white rounded-2xl font-bold">
                                    ${state.menu.map(m => `<option value="${m.category}">${m.category}</option>`).join('')}
                                </select>
                                <button onclick="handleAddModifierGroup()" class="w-full bg-purple-600 text-white py-5 rounded-2xl font-black text-sm shadow-xl">LINK TO CATEGORY</button>
                            </div>

                            <div class="space-y-8">
                                ${(state.modifiers || []).map((m, idx) => `
                                    <div class="bg-slate-50 p-8 rounded-[3rem] border border-slate-200">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="font-black text-slate-800">${m.name} <span class="text-slate-300 ml-1">(${m.category})</span></span>
                                            <button onclick="handleDeleteModifier(${idx})" class="text-red-400 font-bold text-xs">&times;</button>
                                        </div>
                                        <div class="flex flex-wrap gap-2 mb-6">
                                            ${m.options.map(opt => `<span class="bg-white border px-3 py-1.5 rounded-full text-[10px] font-black text-slate-500">${opt.name} (+$${opt.price})</span>`).join('')}
                                        </div>
                                        <div class="bg-white p-3 rounded-[1.5rem] flex gap-2">
                                            <input id="opt-n-${idx}" placeholder="Option" class="flex-1 text-[10px] font-bold outline-none pl-3">
                                            <input id="opt-p-${idx}" type="number" placeholder="$" class="w-12 text-[10px] font-bold outline-none">
                                            <button onclick="handleModifierOptionAdd(${idx})" class="bg-slate-900 text-white h-10 w-10 rounded-xl font-black">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>
                </div>
            </div>`;
        }

        // --- CONTROLLER LOGIC ---
        function triggerModifierCheck(name, price) {
            orderContext.pendingItem = { name, price };
            render();
        }

        function finalizeAddItem(name, price) {
            orderContext.cart.push({ name, price });
            orderContext.pendingItem = null;
            showToast("✅ Added to Order");
            render();
        }

        function submitOrderToKitchen() {
            socket.emit('send_order_to_kitchen', { customerId: orderContext.activeCustomerId, items: orderContext.cart });
            orderContext.cart = [];
            showToast("🚀 Order Sent!");
            currentScreen = 'customer-list';
            render();
        }

        function handlePinSubmit() {
            if (document.getElementById('pin-input').value === '1234') {
                currentScreen = 'dashboard';
                render();
            } else {
                showToast("❌ Access Denied");
                document.getElementById('pin-input').value = '';
            }
        }

        // --- PRINTING LOGIC (SAFER BUFFER) ---
        function handleKitchenPrint(customerName, items) {
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="text-align:center; padding-bottom:10px; border-bottom:2px solid black; margin-bottom:15px;">
                    <h2 style="font-size:24px; margin:0;">KITCHEN TICKET</h2>
                    <p style="margin:5px 0; font-weight:bold;">${state.settings.restaurantName}</p>
                    <p style="font-size:10px;">${new Date().toLocaleTimeString()}</p>
                </div>
                <div style="font-size:18px; font-weight:black; margin-bottom:15px; background:black; color:white; padding:8px; text-align:center;">
                    CUSTOMER: ${customerName.toUpperCase()}
                </div>
                <div style="font-size:16px; line-height:1.6;">
                    ${items.map(i => `<div style="margin-bottom:8px; border-bottom:1px solid #eee;">[ ] ${i.name}</div>`).join('')}
                </div>
                <div style="margin-top:30px; text-align:center; font-size:10px; border-top:1px solid black; padding-top:10px;">
                    RAMEN POS NETWORK ENGINE
                </div>
            `;
            setTimeout(() => { window.print(); }, 250);
        }

        function handlePrintFinalReceipt(id) {
            const customer = state.customers.find(c => c.id === id);
            if(!customer) return;
            const total = customer.orders.reduce((acc, i) => acc + i.price, 0);
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="text-align:center; border-bottom:3px solid black; padding-bottom:15px; margin-bottom:20px;">
                    <h1 style="font-size:28px; margin:0;">${state.settings.restaurantName}</h1>
                    <p style="font-size:10px;">Visit us again soon!</p>
                </div>
                <div style="margin-bottom:15px; font-weight:bold;">BILL FOR: ${customer.name}</div>
                <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                    ${customer.orders.map(i => `
                        <tr>
                            <td style="padding:6px 0; border-bottom:1px solid #ddd;">${i.name}</td>
                            <td style="text-align:right; padding:6px 0; border-bottom:1px solid #ddd;">$${i.price.toFixed(2)}</td>
                        </tr>
                    `).join('')}
                </table>
                <div style="border-top:4px double black; padding-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-weight:black; font-size:22px;">
                        <span>TOTAL</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                </div>
                <p style="text-align:center; margin-top:50px; font-size:12px; font-weight:bold;">*** THANK YOU ***</p>
            `;
            setTimeout(() => { window.print(); }, 250);
        }

        // --- SETTINGS SYNC ---
        function handleUpdateBranding() {
            socket.emit('update_settings', {
                restaurantName: document.getElementById('brand-name-input').value,
                logoUrl: document.getElementById('brand-logo-input').value
            });
            showToast("✨ Settings Synced");
        }

        function handleAddCategory() {
            const name = document.getElementById('new-cat-input').value;
            if(name) {
                socket.emit('update_menu', [...state.menu, { category: name, items: [] }]);
                document.getElementById('new-cat-input').value = '';
                showToast("📁 Category Created");
            }
        }

        function handleAddItem(idx) {
            const n = document.getElementById(`i-n-${idx}`).value;
            const p = parseFloat(document.getElementById(`i-p-${idx}`).value);
            if(n && !isNaN(p)) {
                let m = JSON.parse(JSON.stringify(state.menu));
                m[idx].items.push({ name: n, price: p });
                socket.emit('update_menu', m);
                showToast("🍔 Item Added");
            }
        }

        function handleAddModifierGroup() {
            const name = document.getElementById('mod-name-input').value;
            const cat = document.getElementById('mod-cat-select').value;
            if(name) {
                const mods = [...(state.modifiers || []), { name, category: cat, options: [] }];
                socket.emit('update_modifiers', mods);
                document.getElementById('mod-name-input').value = '';
                showToast("🎨 Modifier Linked");
            }
        }

        function handleModifierOptionAdd(idx) {
            const n = document.getElementById(`opt-n-${idx}`).value;
            const p = parseFloat(document.getElementById(`opt-p-${idx}`).value) || 0;
            if(n) {
                let mods = JSON.parse(JSON.stringify(state.modifiers));
                mods[idx].options.push({ name: n, price: p });
                socket.emit('update_modifiers', mods);
                showToast("➕ Option Saved");
            }
        }

        // --- UI UTILS ---
        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.style.transform = "translate(-50%, 0)";
            toast.style.opacity = "1";
            setTimeout(() => {
                toast.style.transform = "translate(-50%, -200%)";
                toast.style.opacity = "0";
            }, 2500);
        }

        function handleAddCustomer() { 
            const inp = document.getElementById('new-cust-input');
            if(inp.value) { socket.emit('add_customer', inp.value); inp.value = ''; }
        }
        function handleDeleteCustomer(id) { socket.emit('delete_customer', id); }
        function openOrderingMenu(id) { orderContext.activeCustomerId = id; orderContext.cart = []; currentScreen = 'menu'; render(); }
        function handleDeleteCategory(i) { let m = [...state.menu]; m.splice(i,1); socket.emit('update_menu', m); }
        function handleDeleteItem(idx, iIdx) { let m = JSON.parse(JSON.stringify(state.menu)); m[idx].items.splice(iIdx,1); socket.emit('update_menu', m); }
        function handleDeleteModifier(idx) { let m = [...state.modifiers]; m.splice(idx,1); socket.emit('update_modifiers', m); }

        window.onload = render;
    </script>
</body>
</html>
