<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Restaurant POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Floating Logo Animation for Screensaver */
        @keyframes float {
            0% { transform: translate(0, 0); }
            25% { transform: translate(25vw, 15vh) scale(1.1); }
            50% { transform: translate(55vw, 0) scale(1); }
            75% { transform: translate(25vw, -15vh) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .screensaver-logo {
            animation: float 28s linear infinite alternate;
            max-width: 280px;
            max-height: 280px;
            border-radius: 50%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4));
        }

        /* Smooth Screen Transitions */
        .fade-enter {
            animation: fadeIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Receipt Printing Design */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                margin: 0;
                padding: 4mm;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
                line-height: 1.3;
                color: black;
                display: block !important;
            }
            @page { margin: 0; size: 80mm auto; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        button { touch-action: manipulation; transition: all 0.2s ease; }
        button:active { transform: scale(0.94); }
        input { -webkit-appearance: none; }

        .shadow-premium {
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1), 0 10px 20px -10px rgba(0,0,0,0.05);
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 h-screen overflow-hidden flex flex-col font-sans select-none">

    <script>
        const NGROK_URL = "https://habile-lissa-phytogenic.ngrok-free.dev";
    </script>

    <!-- Main Viewport -->
    <div id="app" class="flex-1 overflow-hidden relative flex flex-col">
        <div class="flex items-center justify-center h-full bg-slate-950 text-white">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-14 w-14 border-t-4 border-blue-500 mb-8"></div>
                <p class="text-xl font-bold tracking-[0.6em] uppercase opacity-40 italic">Ramen OS v2.0</p>
            </div>
        </div>
    </div>

    <!-- Persistent Global Footer -->
    <div id="status-bar" class="bg-slate-950 text-[10px] text-slate-500 px-8 py-3 flex justify-between items-center uppercase tracking-[0.3em] border-t border-slate-800 z-[60]">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="h-2.5 w-2.5 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div>
            <span id="net-status" class="font-bold">Booting Systems...</span>
        </div>
        <div class="flex gap-6 items-center">
            <span id="device-tag" class="font-black text-blue-500">STANDBY</span>
            <span id="clock" class="text-slate-600 tabular-nums">00:00:00</span>
        </div>
    </div>

    <div id="print-area" style="display:none;"></div>

    <!-- Premium Toast Notifications -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[100] transition-all duration-700 translate-y-[-200%] opacity-0 pointer-events-none">
        <div class="bg-slate-900/95 backdrop-blur-md text-white px-10 py-5 rounded-[2.5rem] shadow-2xl flex items-center gap-5 border border-slate-700/50">
            <span id="toast-icon" class="text-2xl filter drop-shadow-md">✨</span>
            <span id="toast-text" class="font-black tracking-tight text-lg">System Update</span>
        </div>
    </div>

    <script>
        // --- CORE APP STATE ---
        let socket;
        let currentRole = null;
        let currentScreen = 'role-selection';
        let state = { 
            customers: [], 
            menu: [], 
            modifiers: [],
            settings: { restaurantName: "PREMIUM RAMEN", logoUrl: "" } 
        };
        let orderContext = { activeCustomerId: null, category: null, cart: [], pendingItem: null };

        // --- NETWORK ENGINE ---
        function connectToServer() {
            socket = io(NGROK_URL, { 
                transports: ['websocket'], 
                reconnection: true,
                reconnectionAttempts: 10
            });
            
            socket.on('connect', () => {
                updateStatusBar(true);
            });

            socket.on('disconnect', () => {
                updateStatusBar(false);
            });

            socket.on('sync_state', (newState) => {
                state = { ...state, ...newState };
                if (!state.modifiers) state.modifiers = [];
                render();
            });

            socket.on('kitchen_print_order', (data) => {
                if (currentRole === 'kitchen' && currentScreen !== 'screensaver') {
                    handleKitchenPrint(data.customerName, data.items);
                }
            });
        }

        function updateStatusBar(online) {
            const status = document.getElementById('net-status');
            const indicator = document.getElementById('status-indicator');
            if(online) {
                status.innerText = "Connection: Stable";
                indicator.className = "h-2.5 w-2.5 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]";
            } else {
                status.innerText = "Connection: Offline";
                indicator.className = "h-2.5 w-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            }
        }

        // --- CLOCK MODULE ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        }, 1000);

        // --- VIEW CONTROLLER ---
        function render() {
            const app = document.getElementById('app');
            app.classList.remove('fade-enter');
            void app.offsetWidth;
            app.classList.add('fade-enter');

            if (!currentRole) return renderRoleSelection(app);

            // Routing Logic
            const roleRoutes = {
                'ordering': {
                    'customer-list': renderOrderingList,
                    'menu': renderOrderingMenu
                },
                'kitchen': {
                    'screensaver': renderKitchenScreensaver,
                    'password': renderKitchenPassword,
                    'dashboard': renderKitchenDashboard,
                    'settings': renderKitchenSettings
                }
            };

            const viewFn = roleRoutes[currentRole][currentScreen];
            if (viewFn) viewFn(app);
        }

        // --- VIEWS: INITIALIZATION ---
        function renderRoleSelection(container) {
            container.innerHTML = `
            <div class="h-full flex flex-col items-center justify-center bg-slate-900 text-white p-12 overflow-hidden relative">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_120%,rgba(59,130,246,0.15),transparent)] pointer-events-none"></div>
                <div class="mb-20 text-center relative z-10">
                    <h1 class="text-7xl font-black italic tracking-tighter mb-6 drop-shadow-2xl">RAMEN <span class="text-blue-500">POS</span></h1>
                    <div class="h-2 w-32 bg-gradient-to-r from-blue-600 to-indigo-600 mx-auto rounded-full"></div>
                    <p class="mt-6 text-slate-500 font-bold uppercase tracking-[0.5em] text-xs">Enterprise Terminal v2</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl relative z-10">
                    <button onclick="setDeviceRole('ordering')" class="bg-blue-600 p-12 rounded-[3.5rem] shadow-2xl transition-all hover:translate-y-[-8px] text-left group">
                        <span class="text-6xl block mb-8 filter drop-shadow-lg">📱</span>
                        <span class="text-4xl font-black block mb-2">Ordering</span>
                        <span class="text-blue-200 text-sm opacity-60 font-medium">Handheld Mobile Terminal</span>
                    </button>
                    <button onclick="setDeviceRole('kitchen')" class="bg-red-600 p-12 rounded-[3.5rem] shadow-2xl transition-all hover:translate-y-[-8px] text-left group">
                        <span class="text-6xl block mb-8 filter drop-shadow-lg">🍳</span>
                        <span class="text-4xl font-black block mb-2">Kitchen</span>
                        <span class="text-red-200 text-sm opacity-60 font-medium">Manager Dashboard</span>
                    </button>
                </div>
            </div>`;
        }

        function setDeviceRole(role) {
            currentRole = role;
            document.getElementById('device-tag').innerText = role.toUpperCase();
            currentScreen = (role === 'ordering') ? 'customer-list' : 'screensaver';
            connectToServer();
            render();
        }

        // --- VIEWS: ORDERING (MOBILE) ---
        function renderOrderingList(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-white">
                <header class="p-8 bg-white flex justify-between items-center border-b">
                    <h2 class="text-3xl font-black italic tracking-tighter">RAMEN <span class="text-blue-500">POS</span></h2>
                    <button onclick="currentRole=null; render()" class="h-12 w-12 flex items-center justify-center bg-slate-50 rounded-2xl text-slate-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </header>
                <div class="p-8 bg-slate-50 border-b">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] mb-4 ml-1">Assign New Session</p>
                    <div class="flex gap-3">
                        <input id="new-cust-input" type="text" placeholder="Table # or Customer Name" class="flex-1 p-5 rounded-3xl border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-lg shadow-inner">
                        <button onclick="handleAddCustomer()" class="bg-blue-600 text-white w-16 h-16 rounded-3xl font-black text-3xl shadow-xl shadow-blue-200">+</button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-8 space-y-5">
                    ${state.customers.map(c => `
                        <div class="flex items-center gap-4">
                            <button onclick="openOrderingMenu('${c.id}')" class="flex-1 bg-white p-8 rounded-[3rem] border-2 border-slate-100 shadow-premium flex justify-between items-center text-left active:bg-blue-50 transition-all">
                                <div>
                                    <span class="block text-2xl font-black text-slate-900">${c.name}</span>
                                    <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">${c.orders.length} items in tray</span>
                                </div>
                                <div class="h-12 w-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-black">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                                </div>
                            </button>
                            <button onclick="handleDeleteCustomer('${c.id}')" class="h-16 w-16 bg-red-50 text-red-400 rounded-[2rem] font-black text-2xl flex items-center justify-center border-2 border-red-100">&times;</button>
                        </div>
                    `).join('')}
                    ${state.customers.length === 0 ? '<div class="text-center py-24 opacity-30 italic font-medium text-slate-400">Waiting for first session...</div>' : ''}
                </div>
            </div>`;
        }

        function renderOrderingMenu(container) {
            const customer = state.customers.find(c => c.id === orderContext.activeCustomerId);
            if (!customer) { currentScreen = 'customer-list'; render(); return; }
            
            if (!orderContext.category && state.menu.length > 0) orderContext.category = state.menu[0].category;
            const activeCat = state.menu.find(m => m.category === orderContext.category);

            container.innerHTML = `
            <div class="flex flex-col h-full bg-white relative">
                <header class="p-6 bg-white border-b flex items-center justify-between z-50">
                    <button onclick="currentScreen='customer-list'; render()" class="h-12 w-12 flex items-center justify-center bg-slate-100 rounded-2xl font-black text-slate-900">
                         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div class="text-center">
                        <span class="block font-black text-xl tracking-tight">${customer.name}</span>
                        <span class="text-[10px] text-blue-500 font-black uppercase tracking-[0.3em]">Ordering Mode</span>
                    </div>
                    <div class="w-12"></div>
                </header>

                <div class="flex overflow-x-auto p-4 gap-3 no-scrollbar bg-slate-50 border-b sticky top-0 z-40">
                    ${state.menu.map(m => `
                        <button onclick="orderContext.category='${m.category}'; render()" class="px-8 py-4 rounded-2xl font-black text-xs whitespace-nowrap transition-all ${orderContext.category === m.category ? 'bg-blue-600 text-white shadow-xl shadow-blue-200' : 'bg-white text-slate-400 border-2 border-slate-100'}">
                            ${m.category.toUpperCase()}
                        </button>
                    `).join('')}
                </div>

                <div class="flex-1 overflow-y-auto p-6 grid grid-cols-2 sm:grid-cols-3 gap-4 content-start pb-48">
                    ${(activeCat?.items || []).map(item => `
                        <button onclick="triggerModifierCheck('${item.name}', ${item.price})" class="bg-white border-2 border-slate-100 p-6 rounded-[2.5rem] text-left h-44 flex flex-col justify-between shadow-premium hover:border-blue-200 active:scale-95">
                            <span class="font-black text-slate-900 text-xl leading-none tracking-tight">${item.name}</span>
                            <span class="text-blue-600 font-black text-2xl">$${item.price.toFixed(2)}</span>
                        </button>
                    `).join('')}
                </div>

                <!-- Floating Cart Action Bar -->
                <div class="absolute bottom-0 left-0 right-0 glass-panel p-8 border-t-2 border-slate-100 rounded-t-[4rem] shadow-[0_-20px_50px_rgba(0,0,0,0.08)] z-[60]">
                    <div class="flex justify-between items-center mb-8 px-4">
                        <div>
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Basket</span>
                            <p class="font-black text-3xl leading-none mt-1">${orderContext.cart.length} Items</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Total</span>
                            <p class="font-black text-3xl leading-none mt-1 text-green-600">$${orderContext.cart.reduce((s,i)=>s+i.price,0).toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="submitOrderToKitchen()" class="w-full bg-slate-950 text-white py-6 rounded-[2.5rem] font-black text-xl shadow-2xl active:bg-blue-600 active:scale-95 transition-all disabled:opacity-10" ${orderContext.cart.length === 0 ? 'disabled' : ''}>SEND TO KITCHEN</button>
                </div>

                ${orderContext.pendingItem ? renderModifierPopup() : ''}
            </div>`;
        }

        function renderModifierPopup() {
            // Find modifiers specifically linked to this category
            const applicableMods = (state.modifiers || []).filter(m => m.category === orderContext.category);
            
            // If no modifiers exist for this category, auto-add the item
            if (applicableMods.length === 0) {
                setTimeout(() => finalizeAddItem(orderContext.pendingItem.name, orderContext.pendingItem.price), 50);
                return '';
            }

            return `
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[100] flex items-end sm:items-center justify-center p-6">
                <div class="bg-white w-full max-w-xl rounded-[4rem] p-12 shadow-2xl fade-enter max-h-[85vh] flex flex-col">
                    <div class="mb-10">
                        <h3 class="text-4xl font-black text-slate-950 tracking-tighter mb-2">Add Extras?</h3>
                        <p class="text-slate-400 font-bold text-lg">Customizing: ${orderContext.pendingItem.name}</p>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto space-y-12 pr-4 no-scrollbar">
                        ${applicableMods.map(mod => `
                            <div>
                                <h4 class="text-[11px] font-black uppercase text-blue-600 tracking-[0.3em] mb-6 flex items-center gap-3">
                                    <span class="h-1.5 w-1.5 rounded-full bg-blue-600"></span>
                                    ${mod.name}
                                </h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    ${mod.options.map(opt => `
                                        <button onclick="finalizeAddItem('${orderContext.pendingItem.name} (${opt.name})', ${orderContext.pendingItem.price + opt.price})" class="bg-slate-50 p-6 rounded-[2rem] border-4 border-transparent hover:border-blue-500 hover:bg-white text-left transition-all shadow-sm group">
                                            <div class="flex justify-between items-center">
                                                <span class="font-black text-slate-800 text-lg group-hover:text-blue-600">${opt.name}</span>
                                                <span class="text-sm font-black text-slate-400">+$${opt.price.toFixed(2)}</span>
                                            </div>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-12 space-y-4">
                        <button onclick="finalizeAddItem(orderContext.pendingItem.name, orderContext.pendingItem.price)" class="w-full bg-slate-100 text-slate-600 py-6 rounded-[2rem] font-black text-lg hover:bg-slate-200">No Extras, Add Plain</button>
                        <button onclick="orderContext.pendingItem = null; render()" class="w-full py-4 text-slate-300 font-black text-xs uppercase tracking-[0.4em]">Dismiss</button>
                    </div>
                </div>
            </div>`;
        }

        // --- VIEWS: KITCHEN TERMINAL ---
        function renderKitchenScreensaver(container) {
            container.innerHTML = `
            <div onclick="currentScreen='password'; render()" class="h-full w-full bg-slate-950 flex items-center justify-center cursor-pointer overflow-hidden relative">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(59,130,246,0.1),transparent)] pointer-events-none"></div>
                <img src="${state.settings.logoUrl || 'https://via.placeholder.com/400?text=BRAND+LOGO'}" class="screensaver-logo pointer-events-none object-cover border-8 border-slate-900">
                <div class="absolute bottom-20 text-slate-500 font-black uppercase tracking-[1.5em] text-xs animate-pulse">Touch Terminal to Interface</div>
                <div class="absolute top-16 left-16 text-white opacity-10 font-black text-4xl italic tracking-tighter">${state.settings.restaurantName}</div>
            </div>`;
        }

        function renderKitchenPassword(container) {
            container.innerHTML = `
            <div class="h-full flex items-center justify-center bg-slate-950 p-8">
                <div class="bg-white rounded-[4rem] p-16 w-full max-w-lg shadow-[0_60px_120px_rgba(0,0,0,0.6)]">
                    <div class="text-center mb-12">
                        <div class="h-24 w-24 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 text-5xl shadow-inner border-2 border-blue-100">🔒</div>
                        <h2 class="text-4xl font-black text-slate-950 tracking-tight">Security Check</h2>
                        <p class="text-slate-400 font-bold mt-2">Enter authorized terminal PIN</p>
                    </div>
                    <input id="pin-input" type="password" maxlength="4" placeholder="••••" class="w-full text-center text-7xl p-8 bg-slate-50 border-4 border-transparent focus:border-blue-500 rounded-[2.5rem] mb-12 tracking-[0.5em] focus:outline-none font-black text-slate-950 shadow-inner">
                    <div class="grid grid-cols-2 gap-6">
                        <button onclick="handlePinSubmit()" class="bg-blue-600 text-white py-8 rounded-[2.5rem] font-black text-2xl shadow-2xl shadow-blue-200">ACCESS</button>
                        <button onclick="currentScreen='screensaver'; render()" class="bg-slate-100 text-slate-400 py-8 rounded-[2.5rem] font-black text-2xl">EXIT</button>
                    </div>
                </div>
            </div>`;
            setTimeout(() => { document.getElementById('pin-input').focus(); }, 100);
        }

        function renderKitchenDashboard(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-slate-50">
                <header class="bg-slate-950 p-10 text-white flex justify-between items-center shadow-2xl z-50">
                    <div class="flex items-center gap-8">
                        <div class="h-20 w-20 rounded-[2rem] bg-white p-1 overflow-hidden shadow-xl border-4 border-slate-800">
                            <img src="${state.settings.logoUrl || ''}" class="h-full w-full object-cover rounded-[1.8rem]">
                        </div>
                        <div>
                            <h1 class="font-black text-4xl tracking-tighter italic leading-none">${state.settings.restaurantName}</h1>
                            <div class="flex items-center gap-3 mt-3">
                                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                                <p class="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em]">KITCHEN LIVE DATA FEED</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-6">
                        <button onclick="currentScreen='settings'; render()" class="bg-slate-800 hover:bg-slate-700 px-10 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest transition-all border border-slate-700">Manager Settings</button>
                        <button onclick="currentScreen='screensaver'; render()" class="bg-red-950/40 text-red-500 border border-red-900/40 px-10 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest hover:bg-red-900/60 transition-all">Lock</button>
                    </div>
                </header>
                
                <div class="flex-1 overflow-y-auto p-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12 content-start">
                    ${state.customers.map(c => {
                        const total = c.orders.reduce((acc, i) => acc + i.price, 0);
                        return `
                        <div class="bg-white rounded-[3.5rem] p-10 shadow-premium border-2 border-white hover:border-blue-100 hover:shadow-2xl transition-all flex flex-col h-[520px] group">
                            <div class="mb-8 flex justify-between items-start">
                                <div>
                                    <h3 class="text-4xl font-black text-slate-950 truncate mb-2 tracking-tighter">${c.name}</h3>
                                    <div class="bg-blue-50 text-blue-600 px-5 py-2 rounded-2xl inline-block text-[11px] font-black uppercase tracking-widest border border-blue-100">${c.orders.length} Active Dishes</div>
                                </div>
                            </div>
                            <div class="flex-1 overflow-y-auto mb-8 space-y-4 pr-3 no-scrollbar">
                                ${c.orders.map(o => `
                                    <div class="flex items-start gap-4 text-base font-bold text-slate-600 bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                        <span class="text-blue-500 text-xl leading-none">#</span>
                                        <span class="leading-tight">${o.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-auto border-t-4 border-slate-50 pt-8">
                                <div class="flex justify-between items-baseline mb-8">
                                    <span class="text-slate-400 text-xs font-black uppercase tracking-widest">Running Total</span>
                                    <span class="text-4xl font-black text-green-600 tracking-tighter">$${total.toFixed(2)}</span>
                                </div>
                                <button onclick="handlePrintFinalReceipt('${c.id}')" class="w-full bg-slate-950 text-white py-6 rounded-[2.5rem] font-black text-sm shadow-2xl active:scale-95 hover:bg-blue-600 transition-all">CLOSE & PRINT BILL</button>
                            </div>
                        </div>`;
                    }).join('')}
                    ${state.customers.length === 0 ? '<div class="col-span-full py-52 text-center opacity-10"><span class="text-9xl block mb-10">🥢</span><p class="font-black text-6xl uppercase tracking-tighter italic">Standing By for Orders</p></div>' : ''}
                </div>
            </div>`;
        }

        function renderKitchenSettings(container) {
            container.innerHTML = `
            <div class="flex flex-col h-full bg-white">
                <header class="p-12 border-b-8 border-slate-50 flex justify-between items-center bg-white sticky top-0 z-[60]">
                    <div>
                        <h2 class="text-6xl font-black tracking-tighter text-slate-950 leading-none">Terminal Manager</h2>
                        <p class="text-slate-400 font-bold mt-4 text-lg">Configure Architecture & Branding</p>
                    </div>
                    <button onclick="currentScreen='dashboard'; render()" class="bg-blue-600 text-white px-12 py-6 rounded-[2.5rem] font-black shadow-2xl shadow-blue-200 transition-all active:scale-95 hover:bg-blue-700">BACK TO LIVE FEED</button>
                </header>
                
                <div class="flex-1 overflow-y-auto p-16 max-w-[1600px] mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-20">
                    
                    <!-- BRANDING COLUMN -->
                    <div class="space-y-16">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-10 tracking-[0.5em] flex items-center gap-4">
                                <span class="h-px flex-1 bg-blue-100"></span> 01 BRANDING
                            </h3>
                            <div class="bg-slate-50 p-10 rounded-[3.5rem] space-y-8 shadow-inner">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 block mb-3 ml-3 tracking-widest">Business Name</label>
                                    <input id="brand-name-input" type="text" value="${state.settings.restaurantName}" class="w-full p-6 bg-white rounded-3xl font-bold border-2 border-transparent focus:border-blue-500 outline-none shadow-sm text-lg">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 block mb-3 ml-3 tracking-widest">Corporate Logo (URL)</label>
                                    <input id="brand-logo-input" type="text" value="${state.settings.logoUrl}" class="w-full p-6 bg-white rounded-3xl font-bold border-2 border-transparent focus:border-blue-500 outline-none shadow-sm text-lg">
                                </div>
                                <button onclick="handleUpdateBranding()" class="w-full bg-slate-950 text-white py-6 rounded-3xl font-black text-sm tracking-[0.2em] shadow-xl hover:bg-blue-600 transition-all">SYNCHRONIZE BRAND</button>
                            </div>
                        </section>
                    </div>

                    <!-- MENU COLUMN -->
                    <div class="space-y-16">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-10 tracking-[0.5em] flex items-center gap-4">
                                <span class="h-px flex-1 bg-blue-100"></span> 02 MENU GRID
                            </h3>
                            <div class="bg-blue-50/50 p-10 rounded-[3.5rem] border-2 border-blue-100 mb-12 shadow-sm">
                                <label class="text-[10px] font-black uppercase text-blue-400 block mb-4 ml-3 tracking-widest">Define New Section</label>
                                <div class="flex gap-3">
                                    <input id="new-cat-input" type="text" placeholder="e.g. Signature Bowls" class="flex-1 p-6 bg-white rounded-3xl font-bold outline-none focus:ring-4 focus:ring-blue-100 text-lg">
                                    <button onclick="handleAddCategory()" class="bg-blue-600 text-white px-10 rounded-3xl font-black text-xs shadow-lg shadow-blue-100">CREATE</button>
                                </div>
                            </div>

                            <div class="space-y-10">
                                ${state.menu.map((cat, idx) => `
                                    <div class="bg-slate-50 p-10 rounded-[4rem] border border-slate-100">
                                        <div class="flex justify-between items-center mb-8 border-b border-slate-200 pb-6">
                                            <span class="font-black text-2xl tracking-tight">${cat.category}</span>
                                            <button onclick="handleDeleteCategory(${idx})" class="text-red-400 font-black text-[10px] uppercase hover:text-red-600 tracking-widest transition-colors">Terminate</button>
                                        </div>
                                        <div class="space-y-4 mb-10">
                                            ${cat.items.map((i, iIdx) => `
                                                <div class="flex justify-between bg-white p-5 rounded-3xl shadow-sm border border-slate-50 group">
                                                    <div class="flex items-center gap-4">
                                                        <button onclick="handleDeleteItem(${idx}, ${iIdx})" class="text-slate-200 hover:text-red-500 transition-colors text-2xl font-light">&times;</button>
                                                        <span class="font-bold text-slate-800 text-lg">${i.name}</span>
                                                    </div>
                                                    <span class="font-black text-blue-600 text-lg">$${i.price.toFixed(2)}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="bg-white p-4 rounded-[2.5rem] flex gap-3 border-2 border-slate-100 shadow-inner">
                                            <input id="i-n-${idx}" placeholder="Dish Name" class="flex-1 text-sm font-bold outline-none pl-5">
                                            <input id="i-p-${idx}" type="number" step="0.01" placeholder="Price" class="w-24 text-sm font-bold outline-none border-l pl-3">
                                            <button onclick="handleAddItem(${idx})" class="bg-green-500 text-white h-14 w-14 rounded-2xl font-black text-2xl shadow-lg shadow-green-100 hover:bg-green-600">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>

                    <!-- MODIFIERS COLUMN -->
                    <div class="space-y-16">
                        <section>
                            <h3 class="text-xs font-black uppercase text-blue-500 mb-10 tracking-[0.5em] flex items-center gap-4">
                                <span class="h-px flex-1 bg-blue-100"></span> 03 ADD-ONS
                            </h3>
                            <div class="bg-purple-50 p-10 rounded-[3.5rem] border-2 border-purple-100 mb-12 space-y-6 shadow-sm">
                                <input id="mod-name-input" placeholder="Title (e.g. Broth Upgrades)" class="w-full p-6 bg-white rounded-3xl font-bold outline-none focus:ring-4 focus:ring-purple-100 text-lg shadow-sm">
                                <div class="relative">
                                    <select id="mod-cat-select" class="w-full p-6 bg-white rounded-3xl font-bold outline-none appearance-none text-lg shadow-sm">
                                        ${state.menu.map(m => `<option value="${m.category}">${m.category}</option>`).join('')}
                                    </select>
                                    <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">▼</div>
                                </div>
                                <button onclick="handleAddModifierGroup()" class="w-full bg-purple-600 text-white py-6 rounded-3xl font-black text-sm tracking-[0.2em] shadow-xl hover:bg-purple-700 transition-all">LINK TO SECTION</button>
                            </div>

                            <div class="space-y-10">
                                ${(state.modifiers || []).map((m, idx) => `
                                    <div class="bg-slate-50 p-10 rounded-[4rem] border border-slate-100 shadow-sm relative overflow-hidden">
                                        <div class="absolute top-0 right-0 p-4">
                                             <button onclick="handleDeleteModifier(${idx})" class="text-slate-300 hover:text-red-500 transition-colors font-black text-2xl">&times;</button>
                                        </div>
                                        <div class="mb-6">
                                            <span class="font-black text-2xl text-slate-950 block">${m.name}</span>
                                            <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest mt-1 block">Scope: ${m.category}</span>
                                        </div>
                                        <div class="flex flex-wrap gap-2 mb-10">
                                            ${m.options.map(opt => `
                                                <span class="bg-white border-2 border-slate-100 px-4 py-2 rounded-2xl text-xs font-bold text-slate-500 shadow-sm">
                                                    ${opt.name} <span class="text-purple-500 ml-1">+$${opt.price}</span>
                                                </span>
                                            `).join('')}
                                            ${m.options.length === 0 ? '<span class="text-slate-300 italic text-sm">No options defined yet</span>' : ''}
                                        </div>
                                        <div class="bg-white p-4 rounded-[2.5rem] flex gap-3 border-2 border-slate-100 shadow-inner">
                                            <input id="opt-n-${idx}" placeholder="Extra Title" class="flex-1 text-sm font-bold outline-none pl-5">
                                            <input id="opt-p-${idx}" type="number" placeholder="$" class="w-20 text-sm font-bold outline-none border-l pl-3">
                                            <button onclick="handleModifierOptionAdd(${idx})" class="bg-slate-950 text-white h-14 w-14 rounded-2xl font-black text-xl shadow-xl hover:bg-purple-600 transition-all">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                                ${state.modifiers.length === 0 ? '<div class="text-center py-20 opacity-20 italic">No modifiers globally configured.</div>' : ''}
                            </div>
                        </section>
                    </div>
                </div>
            </div>`;
        }

        // --- CORE CONTROLLERS ---
        function triggerModifierCheck(name, price) {
            orderContext.pendingItem = { name, price };
            render();
        }

        function finalizeAddItem(name, price) {
            orderContext.cart.push({ name, price });
            orderContext.pendingItem = null;
            showToast("✨ Added to Tray");
            render();
        }

        function submitOrderToKitchen() {
            socket.emit('send_order_to_kitchen', { customerId: orderContext.activeCustomerId, items: orderContext.cart });
            orderContext.cart = [];
            showToast("🚀 Order Dispatched!");
            currentScreen = 'customer-list';
            render();
        }

        function handlePinSubmit() {
            if (document.getElementById('pin-input').value === '1234') {
                currentScreen = 'dashboard';
                render();
                showToast("🔓 Terminal Unlocked");
            } else {
                showToast("❌ Invalid Passcode");
                document.getElementById('pin-input').value = '';
            }
        }

        // --- PRINTING ENGINE (RESTORED) ---
        function handleKitchenPrint(customerName, items) {
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="text-align:center; padding-bottom:15px; border-bottom:2px dashed black; margin-bottom:20px;">
                    <h2 style="font-size:26px; margin:0; letter-spacing:-1px;">KITCHEN TICKET</h2>
                    <p style="margin:5px 0; font-weight:bold; font-size:14px;">Terminal: ${state.settings.restaurantName}</p>
                    <p style="font-size:10px; opacity:0.6;">${new Date().toLocaleString()}</p>
                </div>
                <div style="font-size:22px; font-weight:900; margin-bottom:20px; background:black; color:white; padding:12px; text-align:center; border-radius:5px;">
                    CUSTOMER: ${customerName.toUpperCase()}
                </div>
                <div style="font-size:18px; line-height:1.6; font-weight:bold;">
                    ${items.map(i => `<div style="margin-bottom:12px; border-bottom:1px solid #ddd; padding-bottom:5px;">[ ] ${i.name.toUpperCase()}</div>`).join('')}
                </div>
                <div style="margin-top:40px; text-align:center; font-size:10px; border-top:1px solid black; padding-top:15px; font-style:italic;">
                    -- RAMEN POS ENTERPRISE --
                </div>
            `;
            setTimeout(() => { window.print(); }, 300);
        }

        function handlePrintFinalReceipt(id) {
            const customer = state.customers.find(c => c.id === id);
            if(!customer) return;
            const total = customer.orders.reduce((acc, i) => acc + i.price, 0);
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="text-align:center; border-bottom:4px solid black; padding-bottom:20px; margin-bottom:25px;">
                    <h1 style="font-size:32px; margin:0; letter-spacing:-2px;">${state.settings.restaurantName}</h1>
                    <p style="font-size:11px; margin-top:5px; font-weight:bold; text-transform:uppercase;">Hospitality Receipt</p>
                </div>
                <div style="margin-bottom:20px; font-weight:black; font-size:14px;">GUEST: ${customer.name}</div>
                <table style="width:100%; border-collapse:collapse; margin-bottom:25px; font-size:14px;">
                    ${customer.orders.map(i => `
                        <tr>
                            <td style="padding:8px 0; border-bottom:1px solid #eee;">${i.name}</td>
                            <td style="text-align:right; padding:8px 0; border-bottom:1px solid #eee;">$${i.price.toFixed(2)}</td>
                        </tr>
                    `).join('')}
                </table>
                <div style="border-top:5px double black; padding-top:15px; margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-weight:900; font-size:26px; letter-spacing:-1px;">
                        <span>TOTAL</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                </div>
                <p style="text-align:center; margin-top:60px; font-size:14px; font-weight:900; letter-spacing:2px;">*** VISIT AGAIN ***</p>
                <div style="text-align:center; margin-top:10px; font-size:8px;">Transaction ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}</div>
            `;
            setTimeout(() => { window.print(); }, 300);
        }

        // --- DATA SYNC ---
        function handleUpdateBranding() {
            socket.emit('update_settings', {
                restaurantName: document.getElementById('brand-name-input').value,
                logoUrl: document.getElementById('brand-logo-input').value
            });
            showToast("🏢 Branding Synced");
        }

        function handleAddCategory() {
            const name = document.getElementById('new-cat-input').value;
            if(name) {
                socket.emit('update_menu', [...state.menu, { category: name, items: [] }]);
                document.getElementById('new-cat-input').value = '';
                showToast("📁 Section Created");
            }
        }

        function handleAddItem(idx) {
            const n = document.getElementById(`i-n-${idx}`).value;
            const p = parseFloat(document.getElementById(`i-p-${idx}`).value);
            if(n && !isNaN(p)) {
                let m = JSON.parse(JSON.stringify(state.menu));
                m[idx].items.push({ name: n, price: p });
                socket.emit('update_menu', m);
                showToast("🍔 Item Added");
            }
        }

        function handleAddModifierGroup() {
            const name = document.getElementById('mod-name-input').value;
            const cat = document.getElementById('mod-cat-select').value;
            if(name) {
                const updatedMods = [...(state.modifiers || []), { name, category: cat, options: [] }];
                socket.emit('update_modifiers', updatedMods);
                document.getElementById('mod-name-input').value = '';
                showToast("🎨 Modifier Group Linked");
                render(); // Explicit force rerender
            }
        }

        function handleModifierOptionAdd(idx) {
            const n = document.getElementById(`opt-n-${idx}`).value;
            const p = parseFloat(document.getElementById(`opt-p-${idx}`).value) || 0;
            if(n) {
                let mods = JSON.parse(JSON.stringify(state.modifiers));
                mods[idx].options.push({ name: n, price: p });
                socket.emit('update_modifiers', mods);
                showToast("➕ Option Saved");
                render();
            }
        }

        // --- GLOBAL HELPERS ---
        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.style.transform = "translate(-50%, 0)";
            toast.style.opacity = "1";
            setTimeout(() => {
                toast.style.transform = "translate(-50%, -200%)";
                toast.style.opacity = "0";
            }, 3000);
        }

        function handleAddCustomer() { 
            const inp = document.getElementById('new-cust-input');
            if(inp.value) { socket.emit('add_customer', inp.value); inp.value = ''; }
        }
        function handleDeleteCustomer(id) { socket.emit('delete_customer', id); }
        function openOrderingMenu(id) { orderContext.activeCustomerId = id; orderContext.cart = []; currentScreen = 'menu'; render(); }
        function handleDeleteCategory(i) { let m = [...state.menu]; m.splice(i,1); socket.emit('update_menu', m); }
        function handleDeleteItem(idx, iIdx) { let m = JSON.parse(JSON.stringify(state.menu)); m[idx].items.splice(iIdx,1); socket.emit('update_menu', m); }
        function handleDeleteModifier(idx) { let m = [...state.modifiers]; m.splice(idx,1); socket.emit('update_modifiers', m); render(); }

        window.onload = render;
    </script>
</body>
</html>
