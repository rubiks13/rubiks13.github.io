<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Potato Cube Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.5s ease;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 shadow-2xl text-center border border-slate-700">
        <h1 class="text-4xl font-bold mb-2 text-yellow-400">Hot Potato</h1>
        <p class="text-slate-400 mb-8">Solve the cube and pass it! No one knows when the music will stop...</p>

        <!-- Status Display -->
        <div id="status-container" class="mb-10 h-32 flex items-center justify-center">
            <div id="timer-display" class="text-3xl font-bold tracking-tight text-slate-300">
                READY TO START?
            </div>
        </div>

        <!-- Controls -->
        <div class="space-y-4">
            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-2xl text-2xl transition-all active:scale-95 shadow-lg">
                START GAME
            </button>
            
            <button id="stop-btn" class="hidden w-full bg-slate-600 hover:bg-slate-700 text-white font-bold py-4 px-8 rounded-2xl text-2xl transition-all active:scale-95 shadow-lg">
                CANCEL ROUND
            </button>
        </div>

        <!-- Settings -->
        <div class="mt-8 pt-6 border-t border-slate-700 text-left">
            <label class="block text-sm font-medium text-slate-400 mb-2">Random Range (Seconds)</label>
            <div class="flex gap-4">
                <div class="flex-1">
                    <span class="text-xs text-slate-500">Min (Default 5m)</span>
                    <input type="number" id="min-time" value="300" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-center" placeholder="Min">
                </div>
                <div class="flex-1">
                    <span class="text-xs text-slate-500">Max (Default 10m)</span>
                    <input type="number" id="max-time" value="600" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-center" placeholder="Max">
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element with specific filename -->
    <audio id="game-music" src="MjQyMDU4NDQyNDIwNzk_jwz_2beVpZ1b4.mp3" preload="auto"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const timerDisplay = document.getElementById('timer-display');
        const music = document.getElementById('game-music');
        const minInput = document.getElementById('min-time');
        const maxInput = document.getElementById('max-time');
        const body = document.body;

        let gameTimeout;
        let isPlaying = false;

        function getRandomTime(min, max) {
            // Converts seconds to milliseconds
            return Math.floor(Math.random() * (max - min + 1) + min) * 1000;
        }

        function startGame() {
            if (isPlaying) return;
            
            const min = parseInt(minInput.value) || 300;
            const max = parseInt(maxInput.value) || 600;
            const duration = getRandomTime(min, max);

            // UI State - Keeping it neutral so they don't know the end is near
            isPlaying = true;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            timerDisplay.innerText = "GAME IN PROGRESS...";
            timerDisplay.classList.add('text-blue-400');
            body.className = 'bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans';

            // Audio Logic
            music.currentTime = 0;
            music.play().catch(e => {
                console.error("Audio playback failed. Ensure the MP3 file name is exactly correct and in the same folder.");
                timerDisplay.innerText = "ERROR: MUSIC FILE NOT FOUND";
            });

            // End Game Logic
            gameTimeout = setTimeout(() => {
                endGame(true);
            }, duration);
        }

        function endGame(wasExplosion) {
            isPlaying = false;
            clearTimeout(gameTimeout);
            
            music.pause();
            music.currentTime = 0;

            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            
            if (wasExplosion) {
                timerDisplay.innerText = "STOP! ROUND OVER";
                timerDisplay.classList.replace('text-blue-400', 'text-red-500');
                body.style.backgroundColor = '#450a0a'; // Very dark subtle red
                
                // Play a simple alert sound
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, context.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(110, context.currentTime + 0.5);
                
                gain.gain.setValueAtTime(0.5, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(context.destination);
                
                osc.start();
                osc.stop(context.currentTime + 0.5);
            } else {
                timerDisplay.innerText = "READY TO START?";
                timerDisplay.classList.remove('text-blue-400');
                body.style.backgroundColor = '';
                body.className = 'bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans';
            }
        }

        startBtn.addEventListener('click', startGame);
        stopBtn.addEventListener('click', () => endGame(false));

        // Ensure music loops if the round is longer than the song
        music.onended = () => {
            if (isPlaying) {
                music.play();
            }
        };
    </script>
</body>
</html>
