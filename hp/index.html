<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Potato Cube Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse-animation {
            animation: pulse 0.5s infinite;
        }
        body {
            transition: background-color 0.5s ease;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 shadow-2xl text-center border border-slate-700">
        <h1 class="text-4xl font-bold mb-2 text-yellow-400">Hot Potato</h1>
        <p class="text-slate-400 mb-8">Solve the cube and pass it before the music stops!</p>

        <!-- Status Display -->
        <div id="status-container" class="mb-10 h-32 flex flex-center items-center justify-center">
            <div id="timer-display" class="text-6xl font-black tracking-widest text-white">
                READY?
            </div>
        </div>

        <!-- Controls -->
        <div class="space-y-4">
            <button id="start-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl text-2xl transition-all active:scale-95 shadow-lg">
                START GAME
            </button>
            
            <button id="stop-btn" class="hidden w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-2xl text-2xl transition-all active:scale-95 shadow-lg">
                STOP
            </button>
        </div>

        <!-- Settings -->
        <div class="mt-8 pt-6 border-t border-slate-700 text-left">
            <label class="block text-sm font-medium text-slate-400 mb-2">Random Range (Seconds)</label>
            <div class="flex gap-4">
                <input type="number" id="min-time" value="15" class="w-1/2 bg-slate-700 border border-slate-600 rounded-lg p-2 text-center" placeholder="Min">
                <input type="number" id="max-time" value="45" class="w-1/2 bg-slate-700 border border-slate-600 rounded-lg p-2 text-center" placeholder="Max">
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="game-music" src="MjQyMDU4NDQyNDIwNzk_jwz_2beVpZ1b4.mp3" preload="auto"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const timerDisplay = document.getElementById('timer-display');
        const music = document.getElementById('game-music');
        const minInput = document.getElementById('min-time');
        const maxInput = document.getElementById('max-time');
        const body = document.body;

        let gameTimeout;
        let colorInterval;
        let isPlaying = false;

        function getRandomTime(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min) * 1000;
        }

        function startGame() {
            if (isPlaying) return;
            
            const min = parseInt(minInput.value) || 10;
            const max = parseInt(maxInput.value) || 60;
            const duration = getRandomTime(min, max);

            // UI State
            isPlaying = true;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            timerDisplay.innerText = "PASS IT!";
            timerDisplay.classList.add('pulse-animation');
            body.classList.replace('bg-slate-900', 'bg-green-900');

            // Audio Logic
            music.currentTime = 0;
            music.play().catch(e => {
                console.error("Audio playback failed. Ensure MjQyMDU4NDQyNDIwNzk_jwz_2beVpZ1b4.mp3 is in the same folder.");
                timerDisplay.innerText = "ERROR: NO AUDIO";
            });

            // Color Warning Logic (Turns redder as time passes)
            const startTime = Date.now();
            colorInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const ratio = elapsed / duration;
                
                if (ratio > 0.8) {
                    body.style.backgroundColor = '#991b1b'; // Dark Red
                } else if (ratio > 0.5) {
                    body.style.backgroundColor = '#92400e'; // Dark Orange
                }
            }, 100);

            // End Game Logic
            gameTimeout = setTimeout(() => {
                endGame(true);
            }, duration);
        }

        function endGame(wasExplosion) {
            isPlaying = false;
            clearTimeout(gameTimeout);
            clearInterval(colorInterval);
            
            music.pause();
            music.currentTime = 0;

            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            timerDisplay.classList.remove('pulse-animation');
            
            if (wasExplosion) {
                timerDisplay.innerText = "BOOM!";
                body.style.backgroundColor = '#ef4444'; // Bright Red
                
                // Play a simple beep if the main music stops
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                osc.type = 'sawtooth';
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 1);
            } else {
                timerDisplay.innerText = "READY?";
                body.style.backgroundColor = '';
                body.className = 'bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans';
            }
        }

        startBtn.addEventListener('click', startGame);
        stopBtn.addEventListener('click', () => endGame(false));

        // Handle music ended event
        music.onended = () => {
            if (isPlaying) {
                // If music is shorter than the random timer, loop it or end game
                music.play();
            }
        };
    </script>
</body>
</html>
