<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCA Scorecard Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A6 dimensions: 105mm x 148mm */
        @page {
            size: A6;
            margin: 0;
        }

        body {
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
        }

        /* Print Styles */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white;
            }
            .scorecard-container {
                padding: 0;
                margin: 0;
                box-shadow: none;
            }
            .scorecard {
                border: none !important;
            }
        }

        .scorecard {
            width: 105mm;
            height: 148mm;
            background: white;
            padding: 8mm 10mm;
            box-sizing: border-box;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            color: black;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .field-row {
            display: flex;
            gap: 0;
        }

        .field-box {
            border: 1.5px solid black;
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 18px;
            min-width: 20px;
        }

        .label-group {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 12px;
            margin-bottom: 2px;
        }

        /* Table Design */
        .score-table {
            width: 100%;
            border-collapse: collapse;
        }

        .score-table th {
            font-weight: normal;
            font-size: 13px;
            padding-bottom: 4px;
            text-align: center;
        }

        /* Ensuring every cell has a visible border for separation */
        .score-table td {
            border: 1.5px solid black;
            height: 40px;
        }

        .attempt-num {
            border: none !important;
            font-size: 28px;
            font-weight: bold;
            width: 30px;
            text-align: left;
            padding-right: 10px;
        }

        .col-scr { width: 45px; }
        .col-result { width: auto; }
        .col-judge { width: 45px; }
        .col-comp { width: 45px; }

        .extra-label {
            font-size: 14px;
            margin-top: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body class="p-4">

    <!-- UI Input Section -->
    <div class="no-print max-w-lg mx-auto bg-white rounded-xl shadow-lg p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">Scorecard Details</h1>
            <button onclick="clearAll()" class="text-sm bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 rounded transition-colors border border-red-200">
                Clear All
            </button>
        </div>
        
        <div class="space-y-3">
            <div>
                <span class="text-xs text-gray-500 ml-1">Competition Name</span>
                <input type="text" id="compName" value="Yopen 2022" placeholder="Competition Name" class="w-full border rounded p-2">
            </div>
            
            <div class="flex gap-2">
                <div class="flex-grow">
                    <span class="text-xs text-gray-500 ml-1">Event</span>
                    <input type="text" id="event" value="3x3x3 Cube" placeholder="Event" class="w-full border rounded p-2">
                </div>
                <div class="w-16">
                    <span class="text-xs text-gray-500 ml-1">Round</span>
                    <input type="text" id="round" value="1" placeholder="Round" class="w-full border rounded p-2 text-center">
                </div>
                <div class="w-16">
                    <span class="text-xs text-gray-500 ml-1">Group</span>
                    <input type="text" id="group" value="2" placeholder="Group" class="w-full border rounded p-2 text-center">
                </div>
            </div>

            <div class="flex gap-2">
                <div class="w-20">
                    <span class="text-xs text-gray-500 ml-1">ID</span>
                    <input type="text" id="compId" value="230" placeholder="ID" class="w-full border rounded p-2 text-center">
                </div>
                <div class="flex-grow">
                    <span class="text-xs text-gray-500 ml-1">Competitor Name</span>
                    <input type="text" id="name" value="Phil Yo" placeholder="Competitor Name" class="w-full border rounded p-2">
                </div>
            </div>

            <div>
                <span class="text-xs text-gray-500 ml-1">Time Limit</span>
                <input type="text" id="timeLimit" value="5:00.00" placeholder="Time Limit" class="w-full border rounded p-2">
            </div>

            <button onclick="window.print()" class="w-full bg-black hover:bg-gray-800 text-white font-bold py-3 rounded-lg mt-2 transition-colors">
                Print Scorecard
            </button>
        </div>
    </div>

    <!-- The Scorecard -->
    <div class="scorecard-container flex justify-center">
        <div id="printArea" class="scorecard">
            <div class="text-center text-3xl font-bold mb-6 h-9 overflow-hidden" id="displayCompName">Yopen 2022</div>

            <div class="header-section">
                <!-- Event Row -->
                <div class="field-row">
                    <div class="label-group flex-grow">
                        <span class="label">Event</span>
                        <div class="field-box" id="displayEvent">3x3x3 Cube</div>
                    </div>
                    <div class="label-group w-14">
                        <span class="label text-center">Round</span>
                        <div class="field-box justify-center border-l-0" id="displayRound">1</div>
                    </div>
                    <div class="label-group w-14">
                        <span class="label text-center">Group</span>
                        <div class="field-box justify-center border-l-0" id="displayGroup">2</div>
                    </div>
                </div>

                <!-- Competitor Row -->
                <div class="field-row mt-2">
                    <div class="label-group w-20">
                        <span class="label">ID</span>
                        <div class="field-box justify-center" id="displayId">230</div>
                    </div>
                    <div class="label-group flex-grow">
                        <span class="label">Name</span>
                        <div class="field-box border-l-0" id="displayName">Phil Yo</div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <table class="score-table">
                <thead>
                    <tr>
                        <th class="attempt-num"></th>
                        <th class="col-scr">Scr</th>
                        <th class="col-result">Result</th>
                        <th class="col-judge">Judge</th>
                        <th class="col-comp">Comp</th>
                    </tr>
                </thead>
                <tbody id="scoreRows">
                    <!-- Rows 1-5 generated by JS -->
                </tbody>
            </table>

            <div class="extra-label">Extra attempt</div>
            <table class="score-table">
                <tr>
                    <td class="attempt-num" style="font-size: 24px; vertical-align: middle;">—</td>
                    <td class="col-scr"></td>
                    <td class="col-result"></td>
                    <td class="col-judge"></td>
                    <td class="col-comp"></td>
                </tr>
            </table>

            <div class="mt-auto text-right text-sm">
                Time limit: <span id="displayLimit">5:00.00</span>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['compName', 'event', 'round', 'group', 'compId', 'name', 'timeLimit'];
        
        function updatePreview() {
            inputs.forEach(id => {
                const displayId = 'display' + id.charAt(0).toUpperCase() + id.slice(1);
                const el = document.getElementById(displayId);
                const inputVal = document.getElementById(id).value;
                if(el) {
                    el.textContent = inputVal;
                    // Keep boxes from collapsing if empty
                    if (inputVal === "" && id !== 'compName') {
                        el.innerHTML = "&nbsp;"; 
                    }
                }
            });
        }

        function clearAll() {
            inputs.forEach(id => {
                document.getElementById(id).value = "";
            });
            updatePreview();
        }

        function setupRows() {
            const tbody = document.getElementById('scoreRows');
            tbody.innerHTML = ""; // Clear existing
            for (let i = 1; i <= 5; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="attempt-num">${i}</td>
                    <td class="col-scr"></td>
                    <td class="col-result"></td>
                    <td class="col-judge"></td>
                    <td class="col-comp"></td>
                `;
                tbody.appendChild(tr);
            }
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        setupRows();
        updatePreview();
    </script>
</body>
</html>
