<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCA Scorecard Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A6 dimensions: 105mm x 148mm */
        @page {
            size: A6;
            margin: 0;
        }

        body {
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Print Styles */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white;
            }
            .scorecard-container {
                padding: 0;
                margin: 0;
                box-shadow: none;
            }
            .scorecard {
                border: none !important;
            }
        }

        .scorecard {
            width: 105mm;
            height: 148mm;
            background: white;
            padding: 6mm 8mm;
            box-sizing: border-box;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            color: black;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .field-row {
            display: flex;
            gap: 0;
        }

        .field-box {
            border: 1.5px solid black;
            height: 28px;
            display: flex;
            align-items: center;
            padding: 0 6px;
            font-size: 16px;
        }

        .label-group {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 11px;
            margin-bottom: 1px;
        }

        /* The "Separated" Row Design */
        .attempt-container {
            display: flex;
            flex-direction: column;
            gap: 6px; /* Space between rows */
        }

        .table-labels {
            display: flex;
            padding-left: 35px; /* Offset for the numbers */
            font-size: 12px;
            margin-bottom: 2px;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .attempt-num {
            width: 35px;
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
        }

        .box-group {
            display: flex;
            flex-grow: 1;
            border: 1.5px solid black;
            height: 38px;
        }

        .cell {
            border-right: 1.5px solid black;
            height: 100%;
        }

        .cell:last-child {
            border-right: none;
        }

        .col-scr { width: 35px; }
        .col-result { flex-grow: 1; }
        .col-judge { width: 45px; }
        .col-comp { width: 45px; }

        .extra-label {
            font-size: 13px;
            margin-top: 10px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body class="p-4">

    <!-- UI Input Section -->
    <div class="no-print max-w-lg mx-auto bg-white rounded-xl shadow-lg p-6 mb-8 border border-gray-200">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h1 class="text-xl font-bold text-gray-800">WCA Scorecard Tool</h1>
            <button onclick="clearAll()" class="text-sm bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-md transition-colors border border-red-200 font-semibold">
                Clear All Fields
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Competition Name</label>
                <input type="text" id="compName" value="Yopen 2022" placeholder="e.g. World Championship 2025" class="w-full border border-gray-300 rounded-md p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="flex gap-3">
                <div class="flex-grow">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Event</label>
                    <input type="text" id="event" value="3x3x3 Cube" placeholder="3x3x3 Cube" class="w-full border border-gray-300 rounded-md p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="w-20">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Round</label>
                    <input type="text" id="round" value="1" placeholder="1" class="w-full border border-gray-300 rounded-md p-2 text-center mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="w-20">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Group</label>
                    <input type="text" id="group" value="2" placeholder="A" class="w-full border border-gray-300 rounded-md p-2 text-center mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="flex gap-3">
                <div class="w-24">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">ID</label>
                    <input type="text" id="compId" value="230" placeholder="123" class="w-full border border-gray-300 rounded-md p-2 text-center mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex-grow">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Competitor Name</label>
                    <input type="text" id="name" value="Phil Yo" placeholder="Full Name" class="w-full border border-gray-300 rounded-md p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="text-xs text-gray-500 font-bold uppercase tracking-wider">Time Limit</label>
                <input type="text" id="timeLimit" value="5:00.00" placeholder="e.g. 1:00.00" class="w-full border border-gray-300 rounded-md p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button onclick="window.print()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg mt-2 transition-all shadow-md active:scale-[0.98]">
                Generate & Print (A6)
            </button>
        </div>
    </div>

    <!-- The Scorecard Container -->
    <div class="scorecard-container flex justify-center">
        <div id="printArea" class="scorecard">
            <!-- Competition Name Header -->
            <div class="text-center text-2xl font-bold mb-4 h-9 flex items-center justify-center overflow-hidden" id="displayCompName">Yopen 2022</div>

            <div class="header-section">
                <div class="field-row">
                    <div class="label-group flex-grow">
                        <span class="label">Event</span>
                        <div class="field-box" id="displayEvent">3x3x3 Cube</div>
                    </div>
                    <div class="label-group w-14">
                        <span class="label text-center">Round</span>
                        <div class="field-box justify-center border-l-0" id="displayRound">1</div>
                    </div>
                    <div class="label-group w-14">
                        <span class="label text-center">Group</span>
                        <div class="field-box justify-center border-l-0" id="displayGroup">2</div>
                    </div>
                </div>

                <div class="field-row mt-1">
                    <div class="label-group w-16">
                        <span class="label">ID</span>
                        <div class="field-box justify-center" id="displayId">230</div>
                    </div>
                    <div class="label-group flex-grow">
                        <span class="label">Name</span>
                        <div class="field-box border-l-0" id="displayName">Phil Yo</div>
                    </div>
                </div>
            </div>

            <!-- Table Labels -->
            <div class="table-labels">
                <div class="col-scr text-center">Scr</div>
                <div class="col-result text-center">Result</div>
                <div class="col-judge text-center">Judge</div>
                <div class="col-comp text-center">Comp</div>
            </div>

            <!-- Separated Attempt Rows -->
            <div class="attempt-container" id="scoreRows">
                <!-- Rows 1-5 generated by JS -->
            </div>

            <div class="extra-label font-semibold">Extra attempt</div>
            <div class="score-row">
                <div class="attempt-num text-xl" style="padding-left: 5px;">—</div>
                <div class="box-group">
                    <div class="cell col-scr"></div>
                    <div class="cell col-result"></div>
                    <div class="cell col-judge"></div>
                    <div class="cell col-comp"></div>
                </div>
            </div>

            <div class="mt-auto text-right text-xs italic">
                Time limit: <span id="displayLimit">5:00.00</span>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['compName', 'event', 'round', 'group', 'compId', 'name', 'timeLimit'];
        
        function updatePreview() {
            inputs.forEach(id => {
                const displayId = 'display' + id.charAt(0).toUpperCase() + id.slice(1);
                const el = document.getElementById(displayId);
                const inputVal = document.getElementById(id).value;
                if(el) {
                    // Always ensure there is at least a space so the box doesn't collapse
                    el.textContent = inputVal;
                    if (inputVal.trim() === "") {
                        el.innerHTML = "&nbsp;"; 
                    }
                }
            });
        }

        function clearAll() {
            inputs.forEach(id => {
                document.getElementById(id).value = "";
            });
            updatePreview();
        }

        function setupRows() {
            const container = document.getElementById('scoreRows');
            container.innerHTML = "";
            for (let i = 1; i <= 5; i++) {
                const row = document.createElement('div');
                row.className = "score-row";
                row.innerHTML = `
                    <div class="attempt-num">${i}</div>
                    <div class="box-group">
                        <div class="cell col-scr"></div>
                        <div class="cell col-result"></div>
                        <div class="cell col-judge"></div>
                        <div class="cell col-comp"></div>
                    </div>
                `;
                container.appendChild(row);
            }
        }

        // Initialize event listeners
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        // Initialize display
        setupRows();
        updatePreview();
    </script>
</body>
</html>
