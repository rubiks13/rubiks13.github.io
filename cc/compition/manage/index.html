<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeComp GitHub Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-black text-blue-500">CUBE<span class="text-white">GIST</span></h1>
        <div id="syncIndicator" class="text-[10px] font-bold px-3 py-1 rounded-full flex items-center bg-slate-800">
            <span id="dot" class="status-dot bg-yellow-500"></span>
            <span id="statusText">CONNECTING...</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            <!-- Scramble Display -->
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-slate-500 text-xs uppercase font-bold mb-2 tracking-widest">Scramble</p>
                <p id="scramble" class="timer-font text-lg text-blue-200 mb-4 select-none">Generating...</p>
                <button onclick="generateScramble()" class="text-xs text-blue-500 hover:text-blue-400 transition">Get New Scramble</button>
            </div>

            <!-- Timer Area -->
            <div id="timerBox" class="glass rounded-3xl p-10 flex flex-col items-center justify-center min-h-[350px] transition-all">
                <div class="w-full max-w-xs mb-6">
                    <label class="block text-[10px] uppercase text-slate-500 font-bold mb-1 ml-1">Select Competitor</label>
                    <select id="userSelect" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Choose a cousin...</option>
                    </select>
                </div>
                
                <div id="display" class="timer-font text-8xl md:text-9xl font-bold mb-8 select-none transition-colors">0.00</div>
                
                <div class="text-center">
                    <p class="text-slate-400 text-sm">Hold <kbd class="bg-slate-700 px-2 py-1 rounded text-white font-mono">SPACE</kbd> to start</p>
                    <p class="text-slate-600 text-[10px] mt-2 italic">Data automatically syncs to your GitHub Gist</p>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="space-y-6">
            <div class="glass rounded-3xl overflow-hidden border border-blue-500/20">
                <div class="bg-blue-600 p-4 font-bold flex justify-between items-center">
                    <span>Cloud Leaderboard</span>
                    <button onclick="pullData()" class="text-[10px] bg-blue-700 px-2 py-1 rounded">Refresh</button>
                </div>
                <div id="leaderboard" class="p-4 space-y-3 min-h-[100px]">
                    <p class="text-center text-slate-500 text-xs py-4">Loading stats...</p>
                </div>
            </div>

            <div class="glass rounded-3xl p-6">
                <h3 class="font-bold mb-4 text-sm">Add Competitor</h3>
                <div class="flex gap-2">
                    <input type="text" id="nameIn" placeholder="Enter name" class="flex-1 bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                    <button onclick="addUser()" class="bg-blue-600 hover:bg-blue-500 px-5 rounded-xl font-bold transition">+</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * SETUP INSTRUCTIONS:
         * 1. Create a Personal Access Token (classic) on GitHub with 'gist' scope.
         * 2. Create a Gist and copy the ID from the URL.
         */
        const GITHUB_TOKEN = "PASTE_YOUR_GITHUB_TOKEN_HERE"; 
        const GIST_ID = "PASTE_YOUR_GIST_ID_HERE";

        let state = { users: [], solves: [] };
        let timer, start, running = false, holding = false, holdStart = 0;

        // --- GITHUB SYNC LOGIC ---
        async function pullData() {
            setSyncStatus('loading');
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                const content = data.files['cube-data.json'].content;
                state = JSON.parse(content || '{"users":[],"solves":[]}');
                if (!state.users) state = { users: [], solves: [] };
                render();
                setSyncStatus('ready');
            } catch (e) {
                console.error(e);
                setSyncStatus('error');
            }
        }

        async function pushData() {
            setSyncStatus('saving');
            try {
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { 'cube-data.json': { content: JSON.stringify(state) } }
                    })
                });
                setSyncStatus('ready');
            } catch (e) {
                console.error(e);
                setSyncStatus('error');
            }
        }

        function setSyncStatus(status) {
            const dot = document.getElementById('dot');
            const txt = document.getElementById('statusText');
            if (status === 'ready') {
                dot.className = 'status-dot bg-green-500';
                txt.innerText = 'CLOUD SYNCED';
            } else if (status === 'loading' || status === 'saving') {
                dot.className = 'status-dot bg-yellow-500 animate-pulse';
                txt.innerText = status.toUpperCase() + '...';
            } else {
                dot.className = 'status-dot bg-red-500';
                txt.innerText = 'SYNC ERROR';
            }
        }

        // --- APP LOGIC ---
        function addUser() {
            const name = document.getElementById('nameIn').value.trim();
            if(!name) return;
            state.users.push({ id: Date.now(), name });
            document.getElementById('nameIn').value = '';
            pushData();
            render();
        }

        function render() {
            const sel = document.getElementById('userSelect');
            const current = sel.value;
            sel.innerHTML = '<option value="">Choose a cousin...</option>' + 
                state.users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            sel.value = current;

            const board = state.users.map(u => {
                const uSolves = state.solves.filter(s => s.uid == u.id).map(s => s.t);
                return { 
                    name: u.name, 
                    best: uSolves.length ? Math.min(...uSolves) : 999,
                    count: uSolves.length
                };
            }).sort((a,b) => a.best - b.best);

            document.getElementById('leaderboard').innerHTML = board.map((b, i) => `
                <div class="flex justify-between items-center bg-slate-800/40 p-3 rounded-xl border border-white/5">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-white">${i+1}. ${b.name}</span>
                        <span class="text-[9px] text-slate-500">${b.count} solves</span>
                    </div>
                    <span class="timer-font text-blue-400 font-bold">${b.best === 999 ? '--' : b.best.toFixed(2)}</span>
                </div>
            `).join('') || '<p class="text-center text-slate-500 text-[10px] py-4">Add your first competitor to start!</p>';
        }

        // --- TIMER LOGIC ---
        function generateScramble() {
            const m = ["R","L","U","D","F","B"];
            const t = ["","'","2"];
            let s = "";
            for(let i=0; i<20; i++) s += m[Math.floor(Math.random()*6)] + t[Math.floor(Math.random()*3)] + " ";
            document.getElementById('scramble').innerText = s;
        }

        window.onkeydown = (e) => {
            if(e.code === 'Space') {
                if(e.target.tagName === 'INPUT') return;
                e.preventDefault();
                if(running) {
                    stopTimer();
                } else if(!holding) {
                    holding = true; holdStart = Date.now();
                    document.getElementById('display').classList.add('text-red-500');
                }
            }
        };

        window.onkeyup = (e) => {
            if(e.code === 'Space' && holding) {
                holding = false;
                if(Date.now() - holdStart > 500) startTimer();
                else document.getElementById('display').classList.remove('text-red-500');
            }
        };

        function startTimer() {
            running = true; start = Date.now();
            document.getElementById('display').classList.remove('text-red-500');
            document.getElementById('display').classList.add('text-blue-500');
            timer = setInterval(() => {
                document.getElementById('display').innerText = ((Date.now()-start)/1000).toFixed(2);
            }, 10);
        }

        function stopTimer() {
            running = false; clearInterval(timer);
            const time = parseFloat(document.getElementById('display').innerText);
            const uid = document.getElementById('userSelect').value;
            if(uid) { 
                state.solves.push({ uid, t: time }); 
                pushData(); 
                generateScramble(); 
            }
            document.getElementById('display').classList.remove('text-blue-500');
        }

        // Initialize
        generateScramble();
        if(GIST_ID !== "PASTE_YOUR_GIST_ID_HERE") {
            pullData();
            setInterval(pullData, 15000); // Auto-refresh leaderboard every 15 seconds
        } else {
            setSyncStatus('error');
            document.getElementById('statusText').innerText = "SETUP REQUIRED";
        }
    </script>
</body>
</html>
