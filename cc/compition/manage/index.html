<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeComp Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .scramble-font { font-family: monospace; letter-spacing: 0.1em; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation Bar -->
    <nav class="bg-indigo-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="navigateTo('competitions')">
                <span>🧊</span> CubeComp
            </h1>
            <div id="nav-breadcrumb" class="text-sm font-medium opacity-80"></div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <!-- PAGE 1: COMPETITIONS LIST -->
        <section id="page-competitions" class="page-section">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Competitions</h2>
                <button onclick="showModal('modal-add-comp')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition">
                    + New Competition
                </button>
            </div>
            <div id="comp-list" class="grid gap-4 sm:grid-cols-2">
                <!-- Comps injected here -->
            </div>
        </section>

        <!-- PAGE 2: COMPETITION DASHBOARD (Competitors & Results) -->
        <section id="page-comp-detail" class="page-section hidden">
            <button onclick="navigateTo('competitions')" class="text-indigo-600 mb-4 flex items-center gap-1 hover:underline">
                ← Back to Competitions
            </button>
            
            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <h2 id="current-comp-name" class="text-3xl font-bold text-gray-900 mb-2">Competition Name</h2>
                <p id="current-comp-date" class="text-gray-500"></p>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Competitor Management -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-lg">Competitors</h3>
                        <button onclick="showModal('modal-add-competitor')" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Add</button>
                    </div>
                    <div id="competitor-list" class="space-y-2">
                        <!-- Competitors injected here -->
                    </div>
                </div>

                <!-- Leaderboard -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <h3 class="font-bold text-lg mb-4">Current Standings (Ao5)</h3>
                    <div id="leaderboard-list" class="space-y-3">
                        <!-- Rankings injected here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 3: COMPETITOR PROFILE (Solves & Scrambler) -->
        <section id="page-competitor-profile" class="page-section hidden">
            <button onclick="navigateTo('comp-detail')" class="text-indigo-600 mb-4 flex items-center gap-1 hover:underline">
                ← Back to Competition
            </button>

            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <h2 id="profile-name" class="text-2xl font-bold">Competitor Name</h2>
                <div class="flex gap-4 mt-2 text-sm">
                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded">PB: <span id="profile-pb">-</span></span>
                    <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded">Best Ao5: <span id="profile-ao5">-</span></span>
                </div>
            </div>

            <!-- Scrambler Section -->
            <div class="bg-indigo-900 text-white rounded-xl p-6 mb-6 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold uppercase tracking-widest opacity-70">Official Scramble</span>
                    <button onclick="generateNewScramble()" class="text-xs bg-white/20 hover:bg-white/30 px-2 py-1 rounded transition">New Scramble</button>
                </div>
                <div id="scramble-display" class="scramble-font text-xl md:text-2xl text-center font-medium mb-6 min-h-[3rem]">
                    R2 U' B2 D L2 U' R2 D' F2 L' B' L2 F R2 B' U R2 B' U'
                </div>
                <div class="flex gap-2">
                    <input type="number" id="solve-input" placeholder="Enter solve time (e.g. 15.42)" step="0.01" 
                        class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50">
                    <button onclick="addSolve()" class="bg-white text-indigo-900 font-bold px-6 py-3 rounded-lg hover:bg-indigo-50 transition">Submit</button>
                </div>
            </div>

            <!-- Solve History -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="font-bold mb-4">Recent Solves</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-xs uppercase border-b">
                                <th class="py-2">#</th>
                                <th class="py-2">Time</th>
                                <th class="py-2">Scramble</th>
                                <th class="py-2">Date</th>
                            </tr>
                        </thead>
                        <tbody id="solve-history-list">
                            <!-- Solves injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <!-- Add Competition Modal -->
        <div id="modal-add-comp" class="bg-white rounded-xl p-6 w-full max-w-md hidden">
            <h3 class="text-xl font-bold mb-4">New Competition</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Competition Name</label>
                    <input type="text" id="input-comp-name" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Date</label>
                    <input type="date" id="input-comp-date" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModals()" class="flex-1 px-4 py-2 border rounded-lg">Cancel</button>
                    <button onclick="createCompetition()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg">Create</button>
                </div>
            </div>
        </div>

        <!-- Add Competitor Modal -->
        <div id="modal-add-competitor" class="bg-white rounded-xl p-6 w-full max-w-md hidden">
            <h3 class="text-xl font-bold mb-4">Add Competitor</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="input-competitor-name" class="w-full border rounded-lg p-2 mt-1" placeholder="e.g. Feliks Zemdegs">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModals()" class="flex-1 px-4 py-2 border rounded-lg">Cancel</button>
                    <button onclick="addCompetitor()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let appData = {
            competitions: []
        };
        let currentCompId = null;
        let currentCompetitorId = null;
        let currentScramble = "";

        // Initialization
        window.onload = () => {
            const saved = localStorage.getItem('cube_comp_data');
            if (saved) appData = JSON.parse(saved);
            renderCompetitions();
            generateNewScramble();
        };

        function saveData() {
            localStorage.setItem('cube_comp_data', JSON.stringify(appData));
        }

        // Navigation
        function navigateTo(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            const breadcrumb = document.getElementById('nav-breadcrumb');
            if (pageId === 'competitions') {
                breadcrumb.innerText = "Home";
                renderCompetitions();
            } else if (pageId === 'comp-detail') {
                const comp = appData.competitions.find(c => c.id === currentCompId);
                breadcrumb.innerText = comp.name;
                renderCompDetail();
            } else if (pageId === 'competitor-profile') {
                const comp = appData.competitions.find(c => c.id === currentCompId);
                const user = comp.competitors.find(u => u.id === currentCompetitorId);
                breadcrumb.innerText = `${comp.name} > ${user.name}`;
                renderCompetitorProfile();
            }
            window.scrollTo(0, 0);
        }

        // --- Competition Logic ---
        function createCompetition() {
            const name = document.getElementById('input-comp-name').value;
            const date = document.getElementById('input-comp-date').value;
            if (!name) return;

            const newComp = {
                id: Date.now().toString(),
                name,
                date,
                competitors: []
            };

            appData.competitions.push(newComp);
            saveData();
            closeModals();
            renderCompetitions();
        }

        function renderCompetitions() {
            const container = document.getElementById('comp-list');
            container.innerHTML = appData.competitions.length ? '' : '<p class="text-gray-400 col-span-2">No competitions added yet.</p>';
            
            appData.competitions.forEach(comp => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:border-indigo-300 transition cursor-pointer group";
                card.onclick = () => {
                    currentCompId = comp.id;
                    navigateTo('comp-detail');
                };
                card.innerHTML = `
                    <h3 class="font-bold text-lg group-hover:text-indigo-600 transition">${comp.name}</h3>
                    <p class="text-sm text-gray-500">${comp.date || 'No date set'}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded">${comp.competitors.length} Competitors</span>
                        <span class="text-indigo-500 text-sm font-semibold">View →</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Competition Detail Logic ---
        function renderCompDetail() {
            const comp = appData.competitions.find(c => c.id === currentCompId);
            document.getElementById('current-comp-name').innerText = comp.name;
            document.getElementById('current-comp-date').innerText = comp.date || "Ongoing";

            // Render Competitor List
            const list = document.getElementById('competitor-list');
            list.innerHTML = comp.competitors.length ? '' : '<p class="text-xs text-gray-400">Add competitors to start.</p>';
            
            comp.competitors.forEach(user => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition";
                item.onclick = () => {
                    currentCompetitorId = user.id;
                    navigateTo('competitor-profile');
                };
                item.innerHTML = `
                    <span class="font-medium">${user.name}</span>
                    <span class="text-gray-400">Best: ${calculatePB(user.solves)}</span>
                `;
                list.appendChild(item);
            });

            // Render Leaderboard
            const leaderboard = document.getElementById('leaderboard-list');
            const ranked = [...comp.competitors].sort((a, b) => {
                const aAvg = calculateAo5(a.solves);
                const bAvg = calculateAo5(b.solves);
                if (aAvg === "DNF" || aAvg === "-") return 1;
                if (bAvg === "DNF" || bAvg === "-") return -1;
                return parseFloat(aAvg) - parseFloat(bAvg);
            });

            leaderboard.innerHTML = ranked.length ? '' : '<p class="text-xs text-gray-400">No results yet.</p>';
            ranked.forEach((user, idx) => {
                const avg = calculateAo5(user.solves);
                const entry = document.createElement('div');
                entry.className = "flex items-center gap-3";
                entry.innerHTML = `
                    <div class="w-6 h-6 flex items-center justify-center rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold">${idx + 1}</div>
                    <div class="flex-1 flex justify-between items-center">
                        <span class="text-sm font-medium">${user.name}</span>
                        <span class="text-sm font-bold text-indigo-600">${avg}</span>
                    </div>
                `;
                leaderboard.appendChild(entry);
            });
        }

        function addCompetitor() {
            const name = document.getElementById('input-competitor-name').value;
            if (!name) return;
            
            const comp = appData.competitions.find(c => c.id === currentCompId);
            comp.competitors.push({
                id: Date.now().toString(),
                name,
                solves: []
            });
            
            saveData();
            closeModals();
            renderCompDetail();
        }

        // --- Competitor Profile & Timing Logic ---
        function renderCompetitorProfile() {
            const comp = appData.competitions.find(c => c.id === currentCompId);
            const user = comp.competitors.find(u => u.id === currentCompetitorId);
            
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-pb').innerText = calculatePB(user.solves);
            document.getElementById('profile-ao5').innerText = calculateAo5(user.solves);

            const history = document.getElementById('solve-history-list');
            history.innerHTML = '';
            
            [...user.solves].reverse().forEach((solve, i) => {
                const row = document.createElement('tr');
                row.className = "border-b text-sm";
                row.innerHTML = `
                    <td class="py-3 text-gray-400">${user.solves.length - i}</td>
                    <td class="py-3 font-bold">${solve.time}s</td>
                    <td class="py-3 text-gray-500 truncate max-w-[150px] md:max-w-xs" title="${solve.scramble}">${solve.scramble}</td>
                    <td class="py-3 text-gray-400 text-xs">${new Date(solve.timestamp).toLocaleDateString()}</td>
                `;
                history.appendChild(row);
            });
        }

        function addSolve() {
            const val = document.getElementById('solve-input').value;
            if (!val || isNaN(val)) return;

            const comp = appData.competitions.find(c => c.id === currentCompId);
            const user = comp.competitors.find(u => u.id === currentCompetitorId);

            user.solves.push({
                time: parseFloat(val).toFixed(2),
                scramble: currentScramble,
                timestamp: Date.now()
            });

            document.getElementById('solve-input').value = "";
            saveData();
            generateNewScramble();
            renderCompetitorProfile();
        }

        // --- Scrambler Utility ---
        function generateNewScramble() {
            const moves = ["U", "D", "L", "R", "F", "B"];
            const modifiers = ["", "'", "2"];
            let scramble = [];
            let lastMove = "";

            for (let i = 0; i < 20; i++) {
                let move = moves[Math.floor(Math.random() * moves.length)];
                while (move === lastMove) {
                    move = moves[Math.floor(Math.random() * moves.length)];
                }
                lastMove = move;
                scramble.push(move + modifiers[Math.floor(Math.random() * modifiers.length)]);
            }
            
            currentScramble = scramble.join(" ");
            document.getElementById('scramble-display').innerText = currentScramble;
        }

        // --- Stats Calculations ---
        function calculatePB(solves) {
            if (!solves.length) return "-";
            return Math.min(...solves.map(s => parseFloat(s.time))).toFixed(2) + "s";
        }

        function calculateAo5(solves) {
            if (solves.length < 5) return "-";
            const lastFive = solves.slice(-5).map(s => parseFloat(s.time));
            lastFive.sort((a, b) => a - b);
            // Trim fastest and slowest
            const trimmed = lastFive.slice(1, 4);
            const sum = trimmed.reduce((a, b) => a + b, 0);
            return (sum / 3).toFixed(2);
        }

        // --- UI Modal Helpers ---
        function showModal(id) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function closeModals() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden'));
            // Clear inputs
            document.querySelectorAll('input').forEach(i => { if(i.id !== 'solve-input') i.value = "" });
        }
    </script>
</body>
</html>
