<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cube League Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .btn-primary { @apply bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed; }
        .btn-ghost { @apply text-slate-400 hover:text-white transition-colors text-sm; }
        .card { @apply bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl; }
        
        .tab-btn { @apply px-4 py-2 font-semibold text-slate-400 border-b-2 border-transparent transition-all; }
        .tab-btn.active { @apply text-blue-400 border-blue-400; }

        .view-hidden { display: none !important; }

        input, select {
            @apply bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white;
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- 1. COMPETITION SELECTION VIEW -->
    <div id="view-setup" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="max-w-md w-full card space-y-6">
            <h2 class="text-2xl font-bold text-center">Competition Hub</h2>
            <div class="space-y-4">
                <form id="comp-form" class="flex flex-col gap-2">
                    <label class="text-xs text-slate-400 font-bold uppercase">Create New Event</label>
                    <div class="flex gap-2">
                        <input type="text" id="new-comp-name" placeholder="e.g. Summer Cup 2024" class="flex-grow">
                        <button type="submit" class="btn-primary">Create</button>
                    </div>
                </form>
                <div class="border-t border-slate-700 pt-4">
                    <p class="text-xs text-slate-400 mb-2 uppercase tracking-widest font-bold">Past Events</p>
                    <div id="comp-list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                        <!-- Comps here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">CubeLeague</h1>
                <span id="active-comp-display" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30"></span>
            </div>
            <button onclick="location.reload()" class="btn-ghost">Exit Competition</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        
        <!-- Navigation Tabs -->
        <div class="flex gap-4 border-b border-slate-700 mb-8 overflow-x-auto">
            <button class="tab-btn active" id="tab-btn-players" onclick="showView('players')">Roster & Stats</button>
            <button class="tab-btn" id="tab-btn-log" onclick="showView('log')">Enter Times</button>
            <button class="tab-btn" id="tab-btn-analytics" onclick="showView('analytics')">Improvement Graphs</button>
        </div>

        <!-- 2. PLAYERS & ROSTER VIEW -->
        <div id="view-players" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="card">
                    <h2 class="text-xl font-semibold mb-4">Add Competitor</h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="new-player-name" placeholder="Enter name..." class="flex-grow">
                        <button id="add-player-btn" class="btn-primary">Add</button>
                    </div>
                </section>
            </div>
            <div class="lg:col-span-8">
                <section class="card h-full">
                    <h2 class="text-xl font-semibold mb-4">Competitor Stats (Lifetime)</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-700 text-xs uppercase">
                                    <th class="pb-3 px-2">Name</th>
                                    <th class="pb-3 px-2">Best (PB)</th>
                                    <th class="pb-3 px-2">Average</th>
                                    <th class="pb-3 px-2">Solves</th>
                                    <th class="pb-3 px-2 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="roster-list" class="divide-y divide-slate-700">
                                <!-- Roster injected here -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>

        <!-- 3. MANUAL ENTRY VIEW -->
        <div id="view-log" class="view-hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-8">
                <section class="card">
                    <h2 class="text-xl font-semibold mb-6">Enter Results</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                        <div class="flex flex-col gap-2">
                            <label class="text-xs text-slate-400 font-bold uppercase">Competitor</label>
                            <select id="entry-competitor">
                                <option value="">Select...</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs text-slate-400 font-bold uppercase">Time (Seconds)</label>
                            <input type="number" id="entry-time" step="0.01" placeholder="0.00" onkeydown="if(event.key==='Enter') saveManualEntry()">
                        </div>
                        <button onclick="saveManualEntry()" class="btn-primary w-full">Save Result</button>
                    </div>
                </section>

                <section class="card">
                    <h2 class="text-xl font-semibold mb-4">Recent Entries (This Comp)</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <tbody id="solves-history" class="divide-y divide-slate-700"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-4">
                <section class="card">
                    <h2 class="text-xl font-semibold mb-4">Comp Standings</h2>
                    <div id="leaderboard" class="space-y-3"></div>
                </section>
            </div>
        </div>

        <!-- 4. ANALYTICS VIEW -->
        <div id="view-analytics" class="view-hidden space-y-8">
            <section class="card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold">Improvement Data</h2>
                    <select id="analytics-competitor-select">
                        <option value="">Select Competitor...</option>
                    </select>
                </div>
                <div class="h-[350px] w-full bg-slate-900/50 rounded-lg p-4 mb-8">
                    <canvas id="improvementChart"></canvas>
                </div>
                <div id="comp-breakdown" class="space-y-3"></div>
            </section>
        </div>
    </main>

    <script>
        // --- DATA STORE ---
        let competitions = JSON.parse(localStorage.getItem('cube_competitions') || '[]');
        let players = JSON.parse(localStorage.getItem('cube_players') || '[]');
        let solves = JSON.parse(localStorage.getItem('cube_solves') || '[]');
        let activeCompId = null;
        let chartInstance = null;

        // --- NAVIGATION ---
        function showView(viewId) {
            ['players', 'log', 'analytics'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('view-hidden');
                document.getElementById(`tab-btn-${v}`).classList.remove('active');
            });
            document.getElementById(`view-${viewId}`).classList.remove('view-hidden');
            document.getElementById(`tab-btn-${viewId}`).classList.add('active');
            
            if (viewId === 'analytics') updateAnalytics();
            renderAll();
        }

        // --- COMPETITION HUB ---
        document.getElementById('comp-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('new-comp-name').value.trim();
            if (!name) return;
            const newComp = { id: 'comp_' + Date.now(), name, date: Date.now() };
            competitions.push(newComp);
            localStorage.setItem('cube_competitions', JSON.stringify(competitions));
            document.getElementById('new-comp-name').value = '';
            renderCompSelection();
            selectComp(newComp.id);
        };

        function renderCompSelection() {
            const list = document.getElementById('comp-list');
            list.innerHTML = '';
            competitions.sort((a,b) => b.date - a.date).forEach(c => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 bg-slate-800 hover:bg-slate-700 rounded-lg border border-slate-700 transition-all flex justify-between items-center group";
                btn.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold group-hover:text-blue-400">${c.name}</span>
                        <span class="text-[10px] text-slate-500">${new Date(c.date).toLocaleDateString()}</span>
                    </div>
                `;
                btn.onclick = () => selectComp(c.id);
                list.appendChild(btn);
            });
        }

        function selectComp(id) {
            activeCompId = id;
            const comp = competitions.find(c => c.id === id);
            document.getElementById('active-comp-display').textContent = comp.name;
            document.getElementById('view-setup').classList.add('view-hidden');
            renderAll();
        }

        // --- ACTIONS ---
        document.getElementById('add-player-btn').onclick = () => {
            const name = document.getElementById('new-player-name').value.trim();
            if (!name) return;
            players.push({ id: 'p_' + Date.now(), name });
            document.getElementById('new-player-name').value = '';
            saveData();
        };

        function saveManualEntry() {
            const pId = document.getElementById('entry-competitor').value;
            const timeVal = document.getElementById('entry-time').value;
            if (!pId || !timeVal || !activeCompId) return;

            solves.push({
                id: 's_' + Date.now(),
                compId: activeCompId,
                playerId: pId,
                time: parseFloat(timeVal),
                timestamp: Date.now()
            });

            document.getElementById('entry-time').value = '';
            document.getElementById('entry-time').focus();
            saveData();
        }

        function deletePlayer(id) {
            if(!confirm("Remove this competitor and all their times?")) return;
            players = players.filter(p => p.id !== id);
            solves = solves.filter(s => s.playerId !== id);
            saveData();
        }

        function saveData() {
            localStorage.setItem('cube_players', JSON.stringify(players));
            localStorage.setItem('cube_solves', JSON.stringify(solves));
            renderAll();
        }

        // --- UI RENDERING ---
        function renderAll() {
            // Roster Table
            const rosterList = document.getElementById('roster-list');
            rosterList.innerHTML = '';
            players.forEach(p => {
                const pSolves = solves.filter(s => s.playerId === p.id);
                const best = pSolves.length ? Math.min(...pSolves.map(s=>s.time)).toFixed(2) : '--';
                const avg = pSolves.length ? (pSolves.reduce((a,b)=>a+b.time,0)/pSolves.length).toFixed(2) : '--';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-4 px-2 font-bold">${p.name}</td>
                    <td class="py-4 px-2 text-emerald-400 font-mono">${best}s</td>
                    <td class="py-4 px-2 text-blue-400 font-mono">${avg}s</td>
                    <td class="py-4 px-2 text-slate-500">${pSolves.length}</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="deletePlayer('${p.id}')" class="text-red-500 hover:underline text-xs">Delete</button>
                    </td>
                `;
                rosterList.appendChild(tr);
            });

            // Dropdowns
            const logSelect = document.getElementById('entry-competitor');
            const analSelect = document.getElementById('analytics-competitor-select');
            const curLogVal = logSelect.value;
            const curAnalVal = analSelect.value;
            
            logSelect.innerHTML = '<option value="">Select...</option>';
            analSelect.innerHTML = '<option value="">Select Competitor...</option>';
            players.forEach(p => {
                const opt = new Option(p.name, p.id);
                logSelect.add(opt.cloneNode(true));
                analSelect.add(opt);
            });
            logSelect.value = curLogVal;
            analSelect.value = curAnalVal;

            // Standings (Current Comp Only)
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = '';
            const cSolves = solves.filter(s => s.compId === activeCompId);
            const rankings = players.map(p => {
                const ps = cSolves.filter(s => s.playerId === p.id);
                const avg = ps.length ? (ps.reduce((a,b)=>a+b.time,0)/ps.length) : Infinity;
                return { name: p.name, avg };
            }).sort((a,b) => a.avg - b.avg);

            rankings.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = "flex justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-700/50";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 font-bold">#${i+1}</span>
                        <span>${r.name}</span>
                    </div>
                    <span class="text-blue-400 font-bold font-mono">${r.avg === Infinity ? '--' : r.avg.toFixed(2) + 's'}</span>
                `;
                lb.appendChild(div);
            });

            // Log History
            const hist = document.getElementById('solves-history');
            hist.innerHTML = '';
            [...cSolves].sort((a,b) => b.timestamp - a.timestamp).slice(0, 10).forEach(s => {
                const p = players.find(p => p.id === s.playerId);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-2 font-bold">${p ? p.name : '??'}</td>
                    <td class="py-2 text-blue-400 font-bold">${s.time}s</td>
                    <td class="py-2 text-right">
                        <button onclick="solves=solves.filter(x=>x.id!=='${s.id}');saveData()" class="text-slate-600 hover:text-red-500">×</button>
                    </td>
                `;
                hist.appendChild(tr);
            });
        }

        // --- ANALYTICS ---
        document.getElementById('analytics-competitor-select').onchange = updateAnalytics;

        function updateAnalytics() {
            const pid = document.getElementById('analytics-competitor-select').value;
            const container = document.getElementById('comp-breakdown');
            container.innerHTML = '';
            if(!pid) return;

            const ps = solves.filter(s => s.playerId === pid).sort((a,b) => a.timestamp - b.timestamp);

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('improvementChart'), {
                type: 'line',
                data: {
                    labels: ps.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Time Progress (Lower is better)',
                        data: ps.map(s => s.time),
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.2)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#1e293b' } } } }
            });

            competitions.forEach(c => {
                const cs = ps.filter(s => s.compId === c.id);
                if(!cs.length) return;
                const avg = (cs.reduce((a,b)=>a+b.time,0)/cs.length).toFixed(2);
                const best = Math.min(...cs.map(s=>s.time)).toFixed(2);
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-900 rounded-lg border border-slate-700 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <p class="font-bold text-slate-300">${c.name}</p>
                        <p class="text-[10px] text-slate-500">${cs.length} solves</p>
                    </div>
                    <div class="text-right">
                        <p class="text-blue-400 font-bold">AVG: ${avg}s</p>
                        <p class="text-emerald-500 text-xs">Best: ${best}s</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.onload = renderCompSelection;
    </script>
</body>
</html>
