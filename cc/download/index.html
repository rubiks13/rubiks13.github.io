<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Scramble Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .scramble-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-bg {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-800 text-white tracking-tight">3x3 Scramble Pro</h1>
                <p class="text-slate-400 text-sm">Shortened 12-move algorithms with auto-refresh.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="generateBatch()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                    Generate 50
                </button>
                <button onclick="copyHalf(1)" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                    Copy 1-25
                </button>
                <button onclick="copyHalf(2)" class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                    Copy 26-50 & Refresh
                </button>
                <button onclick="toggleSettings(true)" class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </header>

        <div id="scramble-container" class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <!-- Scrambles injected here -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm p-6 rounded-2xl shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-white">Settings</h2>
            <div class="mb-6">
                <label class="block text-sm text-slate-400 mb-2">Start Numbering From:</label>
                <input type="number" id="start-num-input" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white mono focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg font-bold">Save & Reset</button>
                <button onclick="toggleSettings(false)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg font-bold hidden">
        Copied to Clipboard!
    </div>

    <script>
        const faces = ['U', 'D', 'L', 'R', 'F', 'B'];
        const modifiers = ['', "'", '2'];
        const scrambleLength = 12;
        let currentStart = parseInt(localStorage.getItem('scramble_start')) || 1;

        function generateScramble() {
            let scramble = [];
            let lastFace = -1;
            let secondToLastFace = -1;
            while (scramble.length < scrambleLength) {
                let faceIdx = Math.floor(Math.random() * faces.length);
                if (faceIdx === lastFace) continue;
                if (Math.floor(faceIdx / 2) === Math.floor(lastFace / 2) && faceIdx === secondToLastFace) continue;
                let mod = modifiers[Math.floor(Math.random() * modifiers.length)];
                scramble.push(faces[faceIdx] + mod);
                secondToLastFace = lastFace;
                lastFace = faceIdx;
            }
            return scramble.join(' ');
        }

        function generateBatch() {
            const container = document.getElementById('scramble-container');
            container.innerHTML = '';
            
            for (let i = 0; i < 50; i++) {
                const num = currentStart + i;
                const scramble = generateScramble();
                const div = document.createElement('div');
                div.className = 'scramble-card';
                div.innerHTML = `
                    <span class="text-slate-500 font-bold text-xs mono w-10">${num}</span>
                    <p class="mono text-blue-50 text-sm whitespace-nowrap overflow-hidden text-ellipsis">${scramble}</p>
                `;
                container.appendChild(div);
            }
        }

        function copyHalf(part) {
            const cards = document.querySelectorAll('.scramble-card');
            let textToCopy = "";
            
            const startIdx = (part === 1) ? 0 : 25;
            const endIdx = (part === 1) ? 25 : 50;

            for (let i = startIdx; i < endIdx; i++) {
                if(cards[i]) {
                    const num = cards[i].querySelector('span').innerText;
                    const alg = cards[i].querySelector('p').innerText;
                    textToCopy += `${num}. ${alg}\n`;
                }
            }

            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast(part === 2 ? "Copied! Generating next set..." : "Copied 1-25!");

            // Trigger next batch if it's the second half
            if (part === 2) {
                setTimeout(() => {
                    currentStart += 50;
                    localStorage.setItem('scramble_start', currentStart);
                    generateBatch();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 500);
            }
        }

        function toggleSettings(show) {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden', !show);
            if (show) {
                document.getElementById('start-num-input').value = currentStart;
            }
        }

        function saveSettings() {
            const newStart = parseInt(document.getElementById('start-num-input').value);
            if (!isNaN(newStart)) {
                currentStart = newStart;
                localStorage.setItem('scramble_start', currentStart);
                generateBatch();
                toggleSettings(false);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        window.onload = () => {
            currentStart = parseInt(localStorage.getItem('scramble_start')) || 1;
            generateBatch();
        };
    </script>
</body>
</html>
