<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monered Voice Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root { --accent: #6366f1; --studio-blue: #0047AB; }
        
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Studio Layout UI */
        .nav-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid black; display: flex; align-items: center; justify-content: center; font-size: 36px; color: black; background: #cc0000; transition: transform 0.1s; }
        .nav-btn.next { background: #00cc44; }
        .nav-btn:active { transform: scale(0.9); }

        .script-box { background: rgba(0,0,0,0.15); border: 4px solid rgba(0,0,0,0.3); border-radius: 40px; padding: 40px; width: 92%; max-width: 850px; min-height: 280px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 28px; font-weight: 700; margin: 20px auto; line-height: 1.45; color: white; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); }
        
        .action-btn { background: #00cc44; color: white; padding: 24px 110px; border-radius: 60px; font-size: 34px; font-weight: 900; border: none; box-shadow: 0 10px 40px rgba(0,204,68,0.3); }
        .action-btn.stop { background: #cc0000; box-shadow: 0 10px 40px rgba(204,0,0,0.3); }

        .wave-container { display: flex; align-items: center; gap: 4px; height: 50px; }
        .wave-bar { width: 6px; background: #000; border-radius: 3px; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 10px; } to { height: 45px; } }

        /* General UI components */
        .card { background: #141417; border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-icon { width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
        
        .modal { background: rgba(0,0,0,0.97); backdrop-filter: blur(25px); position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .toggle-switch { width: 50px; height: 26px; background: #333; border-radius: 13px; position: relative; cursor: pointer; }
        .toggle-switch.active { background: #00cc44; }
        .toggle-circle { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: all 0.2s; }
        .toggle-switch.active .toggle-circle { left: 27px; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body id="main-body">

    <!-- VIEW: HOME -->
    <div id="view-home" class="h-full flex flex-col p-6 max-w-xl mx-auto">
        <header class="flex justify-between items-center pt-10 pb-6">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">MONERED</h1>
                <p class="text-[10px] font-black opacity-20 uppercase tracking-[0.4em] mt-1">Voice Production Suite</p>
            </div>
            <button onclick="openModal('modal-new')" class="w-16 h-16 bg-indigo-600 rounded-3xl shadow-2xl flex items-center justify-center text-xl"><i class="fas fa-plus"></i></button>
        </header>

        <div id="book-list" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-2"></div>
        
        <footer class="py-10 text-center opacity-10">
            <p class="text-[10px] font-black uppercase tracking-[0.3em]">Hardware Link: Connected</p>
        </footer>
    </div>

    <!-- VIEW: DASHBOARD -->
    <div id="view-dashboard" class="hidden h-full flex flex-col p-6 max-w-xl mx-auto">
        <header class="flex justify-between items-center py-6">
            <button onclick="showView('home')" class="btn-icon"><i class="fas fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="dash-title" class="font-black italic text-xl uppercase truncate max-w-[200px]">Project</h2>
                <p class="text-[9px] font-bold opacity-30 uppercase tracking-widest mt-1">Management</p>
            </div>
            <button onclick="openModal('modal-export')" class="btn-icon text-indigo-400"><i class="fas fa-share-nodes"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto space-y-8 custom-scroll pr-2">
            <!-- Stats Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="card bg-indigo-600/10 border-indigo-600/20">
                    <span id="stat-lines" class="text-3xl font-black italic">0</span>
                    <p class="text-[9px] font-black opacity-40 uppercase tracking-widest mt-1">Total Lines</p>
                </div>
                <div class="card">
                    <span id="stat-percent" class="text-3xl font-black italic">0%</span>
                    <p class="text-[9px] font-black opacity-40 uppercase tracking-widest mt-1">Completion</p>
                </div>
            </div>

            <section>
                <div class="flex justify-between items-end mb-4 px-2">
                    <label class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">1. Select Character</label>
                    <span id="char-count" class="text-[9px] font-bold opacity-20">0 Cast Members</span>
                </div>
                <div id="cast-list" class="grid grid-cols-2 gap-3"></div>
            </section>

            <section id="chapter-section" class="opacity-20 pointer-events-none transition-all duration-500">
                <div class="flex justify-between items-end mb-4 px-2">
                    <label class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">2. Select Chapter</label>
                    <span id="chap-count" class="text-[9px] font-bold opacity-20">0 Available</span>
                </div>
                <div id="chapter-list" class="space-y-3"></div>
            </section>
        </div>

        <div class="py-6">
            <button id="studio-btn" disabled onclick="enterStudio()" class="w-full py-7 bg-indigo-600 rounded-[2.5rem] font-black italic text-2xl shadow-2xl shadow-indigo-600/20 disabled:opacity-10 disabled:grayscale transition-all">STUDIO MODE</button>
        </div>
    </div>

    <!-- VIEW: STUDIO -->
    <div id="view-studio" class="hidden h-full flex flex-col bg-[#0047AB]">
        <div class="flex justify-between items-center p-8">
            <button onclick="prevPart()" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
            <div class="text-center">
                <div id="st-char" class="text-2xl font-black uppercase tracking-tight">CHARACTER</div>
                <div id="st-chap" class="text-xl font-bold opacity-70">Chapter 1</div>
                <div id="st-progress" class="text-[10px] font-black opacity-40 mt-1 uppercase tracking-widest">Line 1 of 12</div>
            </div>
            <button onclick="nextPart()" id="next-btn" class="nav-btn next"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div class="script-box">
                <p id="st-text">Script Loading...</p>
            </div>
            
            <div id="play-container" class="hidden absolute top-[75%]">
                <button onclick="playbackExisting()" class="bg-white/10 border border-white/20 backdrop-blur-xl px-12 py-4 rounded-full font-black text-[12px] tracking-[0.2em] uppercase flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> REVIEW TAKE
                </button>
            </div>
        </div>

        <div class="flex flex-col items-center pb-16 gap-10">
            <div class="flex items-center gap-4 bg-black/10 px-6 py-3 rounded-full border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-40">Auto Advance</span>
                <div id="toggle-auto" class="toggle-switch active" onclick="toggleAutoAdvance()">
                    <div class="toggle-circle"></div>
                </div>
            </div>

            <div id="rec-standby">
                <button onclick="toggleRecording()" class="action-btn">START</button>
            </div>
            
            <div id="rec-active" class="hidden flex items-center gap-12">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-black text-2xl shadow-xl">
                    <i class="fas fa-pause"></i>
                </div>
                <div class="wave-container">
                    <div class="wave-bar" style="animation-delay: 0.1s"></div>
                    <div class="wave-bar" style="animation-delay: 0.3s"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s"></div>
                    <div class="wave-bar" style="animation-delay: 0.4s"></div>
                    <div class="wave-bar" style="animation-delay: 0.5s"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s"></div>
                </div>
                <button onclick="toggleRecording()" class="action-btn stop">DONE</button>
            </div>
        </div>
    </div>

    <!-- MODAL: NEW PROJECT -->
    <div id="modal-new" class="hidden modal">
        <div class="bg-[#141417] w-full max-w-lg rounded-[45px] p-10 border border-white/5 shadow-3xl">
            <h3 class="text-2xl font-black italic mb-8 tracking-tighter uppercase">Create Project</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase opacity-30 tracking-widest ml-4 mb-2 block">Project Identity</label>
                    <input type="text" id="in-title" placeholder="e.g. The Great Gatsby" class="w-full bg-black rounded-3xl p-6 outline-none font-bold text-lg border border-white/5 focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase opacity-30 tracking-widest ml-4 mb-2 block">Script Source (Character: Dialogue)</label>
                    <textarea id="in-text" placeholder="CHAPTER 1&#10;HEIDI: Hello world!&#10;SCENE 1.1... (will be ignored)" class="w-full h-64 bg-black rounded-4xl p-6 outline-none resize-none text-sm font-medium border border-white/5 focus:border-indigo-500 transition-all"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModals()" class="flex-1 py-6 opacity-40 font-black text-[11px] uppercase tracking-[0.2em]">Cancel</button>
                <button onclick="saveProject()" class="flex-1 py-6 bg-indigo-600 rounded-3xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl shadow-indigo-600/20">Initialize</button>
            </div>
        </div>
    </div>

    <!-- MODAL: EXPORT OPTIONS -->
    <div id="modal-export" class="hidden modal">
        <div class="bg-[#141417] w-full max-w-md rounded-[45px] p-10 border border-white/5 text-center">
            <div class="w-20 h-20 bg-indigo-600/20 text-indigo-500 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6">
                <i class="fas fa-file-export"></i>
            </div>
            <h3 class="text-2xl font-black italic mb-2 tracking-tighter uppercase">Export Manager</h3>
            <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-10">Choose your delivery format</p>
            
            <div class="space-y-3">
                <button onclick="runExport('full')" class="w-full py-5 bg-white/5 hover:bg-white/10 rounded-2xl font-bold flex justify-between px-8 items-center group transition-all">
                    <span>Full Production ZIP</span>
                    <i class="fas fa-box-open opacity-20 group-hover:opacity-100 transition-all"></i>
                </button>
                <button onclick="runExport('char')" class="w-full py-5 bg-white/5 hover:bg-white/10 rounded-2xl font-bold flex justify-between px-8 items-center group transition-all">
                    <span>Selected Character Only</span>
                    <i class="fas fa-user-tag opacity-20 group-hover:opacity-100 transition-all"></i>
                </button>
                <button onclick="runExport('chap')" class="w-full py-5 bg-white/5 hover:bg-white/10 rounded-2xl font-bold flex justify-between px-8 items-center group transition-all">
                    <span>Selected Chapter Only</span>
                    <i class="fas fa-folder-closed opacity-20 group-hover:opacity-100 transition-all"></i>
                </button>
            </div>
            
            <button onclick="closeModals()" class="mt-8 opacity-40 text-[10px] font-black uppercase tracking-widest">Return to Dashboard</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://habile-lissa-phytogenic.ngrok-free.dev";
        
        let state = { 
            books: [], 
            activeBook: null, 
            selectedChar: null, 
            selectedChap: null, 
            currentIndex: 0, 
            mediaRecorder: null, 
            chunks: [], 
            isRecording: false, 
            currentFile: null,
            autoAdvance: true 
        };

        async function init() {
            try {
                const res = await fetch(BACKEND_URL + "/get_projects", { headers: {'ngrok-skip-browser-warning': 'true'} });
                const data = await res.json();
                state.books = data.books || [];
                renderHome();
            } catch (e) {
                console.error("Connection Failed to Pi", e);
            }
        }

        function renderHome() {
            const list = document.getElementById('book-list');
            list.innerHTML = state.books.map((b, i) => `
                <div class="card flex justify-between items-center group hover:bg-white/[0.02] transition-colors">
                    <div onclick="openBook(${i})" class="flex-1 cursor-pointer">
                        <h4 class="font-black italic text-2xl uppercase tracking-tighter">${b.title}</h4>
                        <div class="flex gap-4 mt-2">
                            <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">${b.chapters.length} Chapters</span>
                            <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">${b.characters.length} Cast</span>
                        </div>
                    </div>
                    <button onclick="deleteBook(event, ${i})" class="w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-red-500/10 text-slate-800 hover:text-red-500 transition-all">
                        <i class="fas fa-trash-can text-sm"></i>
                    </button>
                </div>
            `).join('') || `
                <div class="text-center py-40 border-2 border-dashed border-white/5 rounded-[45px]">
                    <div class="text-4xl opacity-5 mb-4"><i class="fas fa-microphone-slash"></i></div>
                    <p class="opacity-10 font-black uppercase text-[10px] tracking-[0.3em]">No Projects Found</p>
                </div>
            `;
        }

        async function deleteBook(e, i) {
            e.stopPropagation();
            if (!confirm(`Permanently delete "${state.books[i].title}" and all recordings?`)) return;
            const title = state.books[i].title;
            await fetch(BACKEND_URL + "/delete_project", { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, 
                body: JSON.stringify({ title }) 
            });
            state.books.splice(i, 1);
            await fetch(BACKEND_URL + "/save_projects", { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, 
                body: JSON.stringify({ books: state.books }) 
            });
            renderHome();
        }

        function openBook(i) {
            state.activeBook = state.books[i];
            document.getElementById('dash-title').innerText = state.activeBook.title;
            state.selectedChar = null; state.selectedChap = null;
            
            // Calc stats
            let totalLines = 0;
            state.activeBook.chapters.forEach(ch => totalLines += ch.parts.length);
            document.getElementById('stat-lines').innerText = totalLines;
            document.getElementById('char-count').innerText = `${state.activeBook.characters.length} Cast Members`;

            document.getElementById('cast-list').innerHTML = state.activeBook.characters.map(c => {
                // Find total lines for this specific character
                let charLines = 0;
                state.activeBook.chapters.forEach(ch => {
                    charLines += ch.parts.filter(p => p.character === c).length;
                });
                return `
                    <button onclick="selectChar('${c}')" id="c-${c}" class="card text-left group transition-all hover:border-indigo-500/50">
                        <h5 class="text-[10px] font-black uppercase tracking-widest mb-1 truncate">${c}</h5>
                        <p class="text-[14px] font-black italic opacity-30 group-hover:opacity-100 transition-all">${charLines} Lines</p>
                    </button>
                `;
            }).join('');
            
            document.getElementById('chapter-section').classList.add('opacity-20', 'pointer-events-none');
            showView('dashboard');
        }

        function selectChar(c) {
            state.selectedChar = c;
            document.querySelectorAll('[id^="c-"]').forEach(el => el.classList.remove('bg-indigo-600', 'border-indigo-400', 'scale-105'));
            const activeEl = document.getElementById('c-'+c);
            activeEl.classList.add('bg-indigo-600', 'border-indigo-400', 'scale-105');
            
            // Only show chapters where character exists
            const availableChaps = state.activeBook.chapters.map((ch, idx) => {
                const lines = ch.parts.filter(p => p.character === c).length;
                if (lines === 0) return null;
                return { ch, idx, lines };
            }).filter(x => x !== null);

            document.getElementById('chap-count').innerText = `${availableChaps.length} Available`;
            document.getElementById('chapter-list').innerHTML = availableChaps.map(item => `
                <button onclick="selectChap(${item.idx})" id="ch-${item.idx}" class="w-full card flex justify-between items-center group transition-all hover:bg-white/[0.03]">
                    <span class="font-bold text-sm tracking-tight">${item.ch.title}</span>
                    <span class="text-[9px] font-black opacity-20 uppercase tracking-widest group-hover:opacity-100 transition-all">${item.lines} Lines</span>
                </button>
            `).join('');

            document.getElementById('chapter-section').classList.remove('opacity-20', 'pointer-events-none');
            checkStudio();
        }

        function selectChap(i) {
            state.selectedChap = state.activeBook.chapters[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('bg-white/10', 'border-white/20'));
            document.getElementById('ch-'+i).classList.add('bg-white/10', 'border-white/20');
            checkStudio();
        }

        function checkStudio() {
            document.getElementById('studio-btn').disabled = !state.selectedChar || !state.selectedChap;
        }

        function toggleAutoAdvance() {
            state.autoAdvance = !state.autoAdvance;
            document.getElementById('toggle-auto').classList.toggle('active', state.autoAdvance);
        }

        function enterStudio() {
            state.currentIndex = 0;
            document.getElementById('main-body').className = "bg-[#0047AB]";
            renderPart();
            showView('studio');
        }

        async function renderPart() {
            const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            if (lines.length === 0) return;

            const part = lines[state.currentIndex];
            document.getElementById('st-char').innerText = part.character;
            document.getElementById('st-chap').innerText = state.selectedChap.title;
            document.getElementById('st-text').innerText = part.text;
            document.getElementById('st-progress').innerText = `Line ${state.currentIndex + 1} of ${lines.length}`;
            
            // Standard Naming: Chapter_Part_X_Character.ext
            const filename = `${state.selectedChap.title}_Part_${state.currentIndex + 1}_${part.character}.mp3`;
            
            try {
                const res = await fetch(`${BACKEND_URL}/check_file?book=${state.activeBook.title}&filename=${filename}`, { headers: {'ngrok-skip-browser-warning': 'true'} });
                const data = await res.json();
                state.currentFile = data.exists ? data.filename : null;
                document.getElementById('play-container').classList.toggle('hidden', !data.exists);
            } catch (e) {
                console.error("Check file error");
            }

            document.getElementById('next-btn').style.background = (state.currentIndex === lines.length - 1) ? "#0088ff" : "#00cc44";
        }

        function playbackExisting() {
            if (!state.currentFile) return;
            const url = `${BACKEND_URL}/stream_audio?book=${state.activeBook.title}&filename=${state.currentFile}`;
            new Audio(url).play();
        }

        async function toggleRecording() {
            if (state.isRecording) {
                state.mediaRecorder.stop();
                state.isRecording = false;
                document.getElementById('rec-active').classList.add('hidden');
                document.getElementById('rec-standby').classList.remove('hidden');
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                state.mediaRecorder = new MediaRecorder(stream);
                state.chunks = [];
                state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
                state.mediaRecorder.onstop = handleUpload;
                state.mediaRecorder.start();
                state.isRecording = true;
                document.getElementById('rec-active').classList.remove('hidden');
                document.getElementById('rec-standby').classList.add('hidden');
            }
        }

        async function handleUpload() {
            const blob = new Blob(state.chunks, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append('audio', blob);
            fd.append('book_title', state.activeBook.title);
            fd.append('filename', `${state.selectedChap.title}_Part_${state.currentIndex + 1}_${state.selectedChar}.webm`);
            
            try {
                await fetch(BACKEND_URL + "/upload_audio", { 
                    method: 'POST', 
                    body: fd, 
                    headers: {'ngrok-skip-browser-warning': 'true'} 
                });
                
                if (state.autoAdvance) {
                    const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
                    if (state.currentIndex < lines.length - 1) {
                        state.currentIndex++;
                        renderPart();
                    } else {
                        alert("Chapter Finished!");
                        exitStudio();
                    }
                } else {
                    renderPart(); // Update review button
                }
            } catch (e) {
                alert("Pi storage failed. Check connection.");
            }
        }

        function exitStudio() {
            showView('dashboard');
            document.getElementById('main-body').className = "";
        }

        function nextPart() {
            const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            if (state.currentIndex < lines.length - 1) {
                state.currentIndex++;
                renderPart();
            }
        }

        function prevPart() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                renderPart();
            }
        }

        function saveProject() {
            const title = document.getElementById('in-title').value;
            const text = document.getElementById('in-text').value;
            if (!title || !text) return;
            
            const newBook = parseScript(text, title);
            state.books.push(newBook);
            
            fetch(BACKEND_URL + "/save_projects", { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, 
                body: JSON.stringify({ books: state.books }) 
            }).then(() => {
                renderHome();
                closeModals();
                document.getElementById('in-title').value = "";
                document.getElementById('in-text').value = "";
            });
        }

        function parseScript(text, title) {
            const lines = text.split('\n');
            let book = { title, chapters: [], characters: new Set() };
            let currentChap = null;
            
            // Refined scene exclusion
            const ignoreKeywords = ["SCENE", "EXT.", "INT.", "FADE", "CUT TO", "CLOSE UP", "WIDE"];

            lines.forEach(line => {
                const t = line.trim();
                if (!t) return;
                
                // Chapter Detection
                if (t.toUpperCase().startsWith('CHAPTER')) {
                    currentChap = { title: t, parts: [] };
                    book.chapters.push(currentChap);
                } 
                // Dialogue Detection (Character: Text)
                else if (t.includes(':')) {
                    const [charPart, ...dialogue] = t.split(':');
                    const cleanChar = charPart.trim().toUpperCase();
                    
                    // Validate it's not a technical scene direction
                    const isDirection = ignoreKeywords.some(key => cleanChar.includes(key));
                    const isNumeric = /^[0-9.]+$/.test(cleanChar); // Skip things like "1.1:"
                    
                    if (cleanChar && currentChap && !isDirection && !isNumeric) {
                        book.characters.add(cleanChar);
                        currentChap.parts.push({ 
                            character: cleanChar, 
                            text: dialogue.join(':').trim() 
                        });
                    }
                }
            });
            book.characters = Array.from(book.characters).sort();
            return book;
        }

        function showView(id) {
            ['home', 'dashboard', 'studio'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

        function runExport(type) {
            let url = `${BACKEND_URL}/export?book=${state.activeBook.title}`;
            if (type === 'char' && state.selectedChar) url += `&character=${state.selectedChar}`;
            if (type === 'chap' && state.selectedChap) url += `&chapter=${state.selectedChap.title}`;
            
            window.open(url, '_blank');
        }

        init();
    </script>
</body>
</html>
