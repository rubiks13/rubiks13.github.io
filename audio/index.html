<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin:0; padding:0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .studio-gradient { background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%); }
        .record-btn {
            width: 120px; height: 120px; border-radius: 50%;
            background: #dc2626; border: 8px solid rgba(220, 38, 38, 0.2);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.3); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .record-btn.active { animation: pulse 1.5s infinite; transform: scale(0.9); border-radius: 30%; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .wave-bar { width: 4px; background: #3b82f6; border-radius: 2px; transition: height 0.1s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden studio-gradient">

    <!-- VIEW: DASHBOARD -->
    <div id="view-dashboard" class="h-full flex flex-col p-6 md:p-12 space-y-8 overflow-y-auto">
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div id="status-light" class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div>
                    <h2 class="text-blue-500 font-extrabold text-[10px] uppercase tracking-[0.3em]">System Connected</h2>
                    <h1 class="text-5xl font-black tracking-tighter">Projects</h1>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="refreshData()" class="w-14 h-14 glass rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                    <i data-lucide="refresh-cw" class="w-6 h-6 text-slate-400"></i>
                </button>
                <button onclick="openModal('import')" class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40 active:scale-90 transition-all">
                    <i data-lucide="plus" class="w-7 h-7 text-white"></i>
                </button>
            </div>
        </header>

        <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="empty-ui" class="hidden flex-1 flex flex-col items-center justify-center opacity-30 py-20">
            <i data-lucide="layers" class="w-20 h-20 mb-4"></i>
            <p class="font-bold uppercase tracking-widest text-sm text-center">No projects found.<br>Tap the + to import Heidi.</p>
        </div>
    </div>

    <!-- VIEW: PROJECT DETAIL -->
    <div id="view-project" class="hidden h-full flex flex-col p-6 md:p-12 space-y-10 overflow-y-auto">
        <div class="flex items-center gap-6">
            <button onclick="showView('dashboard')" class="w-12 h-12 glass rounded-xl flex items-center justify-center"><i data-lucide="chevron-left"></i></button>
            <h2 id="det-title" class="text-4xl font-black tracking-tight">Project</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl">
            <div class="glass p-8 rounded-[32px] space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Chapter</label>
                <select id="sel-chapter" onchange="updateDetailUI()" class="w-full bg-slate-900/50 p-4 rounded-xl border border-white/10 outline-none text-xl font-bold"></select>
            </div>
            <div class="glass p-8 rounded-[32px] space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Character</label>
                <select id="sel-character" onchange="updateDetailUI()" class="w-full bg-slate-900/50 p-4 rounded-xl border border-white/10 outline-none text-xl font-bold"></select>
            </div>
        </div>
        <div id="proj-progress-card" class="hidden max-w-4xl glass p-8 rounded-[32px] space-y-6">
            <div class="flex justify-between items-end">
                <div><h3 id="det-progress-text" class="text-3xl font-black">0% Done</h3></div>
                <p id="det-line-count" class="text-slate-500 font-bold uppercase text-xs">0 / 0 Lines</p>
            </div>
            <div class="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-white/5">
                <div id="det-progress-bar" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
            </div>
            <button onclick="enterStudio()" class="w-full py-8 bg-blue-600 rounded-[24px] font-black text-xl active:scale-95 transition-all">ENTER STUDIO</button>
        </div>
    </div>

    <!-- VIEW: STUDIO -->
    <div id="view-studio" class="hidden fixed inset-0 z-50 studio-gradient p-8 flex flex-col">
        <header class="flex justify-between items-center max-w-5xl mx-auto w-full mb-12">
            <button onclick="exitStudio()" class="w-14 h-14 glass rounded-2xl flex items-center justify-center"><i data-lucide="x"></i></button>
            <div class="text-center">
                <h4 id="st-character" class="text-blue-500 font-black text-2xl uppercase tracking-tighter">VOICE</h4>
                <p id="st-chapter" class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">CHAP 1</p>
            </div>
            <div class="w-14"></div>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full">
            <div class="w-full glass p-12 rounded-[48px] min-h-[400px] flex flex-col justify-center relative">
                <p id="st-text" class="text-4xl md:text-6xl text-center font-extrabold leading-tight tracking-tight px-4"></p>
                <div id="st-dots" class="flex justify-center gap-2 mt-12 flex-wrap max-w-lg mx-auto"></div>
            </div>
        </div>
        <div class="max-w-xl mx-auto w-full pb-12 flex flex-col items-center gap-10">
            <div id="visualizer" class="h-10 w-full flex items-center justify-center gap-1 opacity-0 transition-opacity"></div>
            <div class="flex items-center gap-8">
                <button onclick="navStudio(-1)" class="w-16 h-16 glass rounded-full flex items-center justify-center active:scale-90"><i data-lucide="chevron-left"></i></button>
                <button id="btn-record" onclick="toggleRecording()" class="record-btn"><i id="rec-icon" data-lucide="mic" class="w-10 h-10 text-white"></i></button>
                <button onclick="navStudio(1)" class="w-16 h-16 glass rounded-full flex items-center justify-center active:scale-90"><i data-lucide="chevron-right"></i></button>
            </div>
            <div id="st-playback-tools" class="hidden flex gap-4">
                <button onclick="playLast()" class="px-6 py-3 glass rounded-xl font-black text-xs uppercase tracking-widest text-blue-400">Preview</button>
                <button onclick="saveAndNext()" class="px-6 py-3 bg-green-600 rounded-xl font-black text-xs uppercase tracking-widest text-white">Save Take</button>
            </div>
        </div>
    </div>

    <!-- MODAL: IMPORT -->
    <div id="modal-import" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-xl flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-2xl bg-slate-900 rounded-[48px] p-10 border border-white/10 space-y-8">
            <div class="text-center"><h2 class="text-4xl font-black">Import Script</h2></div>
            <input id="imp-title" type="text" placeholder="Project Name" class="w-full bg-slate-800 p-6 rounded-2xl outline-none font-bold text-xl">
            <textarea id="imp-text" placeholder="CHARACTER: Dialogue..." class="w-full h-64 bg-slate-800 p-6 rounded-2xl outline-none font-mono text-sm"></textarea>
            <div class="flex gap-4">
                <button onclick="closeModal('import')" class="flex-1 py-5 font-black text-slate-500">Cancel</button>
                <button onclick="doImport()" class="flex-1 py-5 bg-blue-600 rounded-2xl font-black text-xl">IMPORT</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY LOADER -->
    <div id="overlay-loader" class="hidden fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-8"></div>
        <h3 class="text-2xl font-black mb-2">Processing</h3>
        <p id="loader-msg" class="text-slate-500">Communicating with Raspberry Pi...</p>
    </div>

    <script>
        // --- 1. SET YOUR NGROK HERE ---
        const NGROK_URL = "https://habile-lissa-phytogenic.ngrok-free.dev/"; 
        
        let db = { projects: {} };
        let activeProject = null, studioLines = [], studioIdx = 0;
        let mediaRecorder, chunks = [], audioStream, isRecording = false;

        async function init() {
            lucide.createIcons();
            await refreshData();
            // Start heartbeat
            setInterval(checkConnection, 3000);
        }

        async function checkConnection() {
            const light = document.getElementById('status-light');
            try {
                const res = await fetch(`${NGROK_URL}/health`);
                light.className = res.ok ? 'w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]' : 'w-3 h-3 bg-red-500 rounded-full';
            } catch(e) { light.className = 'w-3 h-3 bg-red-500 rounded-full'; }
        }

        async function refreshData() {
            setLoading(true, "Refreshing Projects...");
            try {
                const res = await fetch(`${NGROK_URL}/api/projects?t=${Date.now()}`);
                if (res.ok) {
                    db = await res.json();
                    renderDashboard();
                }
            } catch (e) { console.error("Sync Failed"); }
            setLoading(false);
        }

        function renderDashboard() {
            const list = document.getElementById('project-list');
            const empty = document.getElementById('empty-ui');
            list.innerHTML = '';
            const projs = Object.values(db.projects || {});
            if (projs.length === 0) empty.classList.remove('hidden');
            else {
                empty.classList.add('hidden');
                projs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
                projs.forEach(p => {
                    const done = p.parts.filter(x => x.recorded).length;
                    const el = document.createElement('div');
                    el.className = "glass p-10 rounded-[40px] active:scale-95 transition-all cursor-pointer";
                    el.onclick = () => openProject(p.id);
                    el.innerHTML = `<h3 class="text-2xl font-black mb-1">${p.title}</h3><p class="text-blue-500 text-xs font-bold uppercase tracking-widest">${p.parts.length} Lines • ${done} Done</p>`;
                    list.appendChild(el);
                });
            }
            lucide.createIcons();
        }

        async function doImport() {
            const title = document.getElementById('imp-title').value.trim();
            const text = document.getElementById('imp-text').value.trim();
            if (!title || !text) return;
            setLoading(true, "Heidi is being processed...");
            try {
                const res = await fetch(`${NGROK_URL}/api/import`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, text })
                });
                if (res.ok) {
                    closeModal('import');
                    setTimeout(refreshData, 1500);
                } else {
                    const err = await res.json();
                    alert("Pi Error: " + err.message);
                }
            } catch (e) { alert("Server connection lost during import."); }
            setLoading(false);
        }

        function openProject(id) {
            activeProject = db.projects[id];
            document.getElementById('det-title').innerText = activeProject.title;
            const chaps = [...new Set(activeProject.parts.map(p => p.chapter))];
            const chars = activeProject.characters;
            document.getElementById('sel-chapter').innerHTML = chaps.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-character').innerHTML = chars.map(c => `<option value="${c}">${c}</option>`).join('');
            updateDetailUI();
            showView('project');
        }

        function updateDetailUI() {
            const chap = document.getElementById('sel-chapter').value;
            const char = document.getElementById('sel-character').value;
            const filtered = activeProject.parts.filter(p => p.chapter === chap && p.character === char);
            const done = filtered.filter(p => p.recorded).length;
            const pct = Math.round((done/filtered.length)*100) || 0;
            document.getElementById('proj-progress-card').classList.remove('hidden');
            document.getElementById('det-progress-text').innerText = `${pct}% Complete`;
            document.getElementById('det-line-count').innerText = `${done} / ${filtered.length} Lines`;
            document.getElementById('det-progress-bar').style.width = `${pct}%`;
        }

        function enterStudio() {
            const chap = document.getElementById('sel-chapter').value;
            const char = document.getElementById('sel-character').value;
            studioLines = activeProject.parts.filter(p => p.chapter === chap && p.character === char);
            studioIdx = 0;
            renderStudio();
            showView('studio');
        }

        function renderStudio() {
            const line = studioLines[studioIdx];
            document.getElementById('st-character').innerText = line.character;
            document.getElementById('st-chapter').innerText = line.chapter;
            document.getElementById('st-text').innerText = line.text;
            const dots = document.getElementById('st-dots');
            dots.innerHTML = '';
            studioLines.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = `h-1.5 rounded-full transition-all ${i === studioIdx ? 'w-8 bg-blue-500' : 'w-2 bg-slate-800'} ${p.recorded ? 'bg-green-500' : ''}`;
                dots.appendChild(d);
            });
            document.getElementById('st-playback-tools').classList.add('hidden');
            document.getElementById('btn-record').classList.remove('hidden');
            lucide.createIcons();
        }

        async function toggleRecording() {
            if (!isRecording) {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(audioStream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('btn-record').classList.add('active');
            } else {
                isRecording = false;
                mediaRecorder.stop();
                audioStream.getTracks().forEach(t => t.stop());
                document.getElementById('btn-record').classList.remove('active');
                mediaRecorder.onstop = () => {
                    document.getElementById('st-playback-tools').classList.remove('hidden');
                    document.getElementById('btn-record').classList.add('hidden');
                };
            }
        }

        async function saveAndNext() {
            setLoading(true, "Syncing Voice to Pi...");
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const line = studioLines[studioIdx];
            const fd = new FormData();
            fd.append('audio', blob); fd.append('projectId', activeProject.id); fd.append('lineId', line.id);
            try {
                const res = await fetch(`${NGROK_URL}/api/upload`, { method: 'POST', body: fd });
                if (res.ok) {
                    line.recorded = true;
                    if (studioIdx < studioLines.length - 1) { studioIdx++; renderStudio(); }
                    else { exitStudio(); }
                }
            } catch (e) { alert("Audio sync failed"); }
            setLoading(false);
        }

        function showView(id) {
            ['dashboard', 'project', 'studio'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${id}`).classList.remove('hidden');
        }
        function openModal(id) { document.getElementById(`modal-${id}`).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(`modal-${id}`).classList.add('hidden'); }
        function setLoading(s, m) { document.getElementById('loader-msg').innerText = m; document.getElementById('overlay-loader').classList.toggle('hidden', !s); }
        function navStudio(dir) { const n = studioIdx + dir; if (n >= 0 && n < studioLines.length) { studioIdx = n; renderStudio(); } }
        function exitStudio() { showView('project'); updateDetailUI(); refreshData(); }
        function playLast() { const b = new Blob(chunks, { type: 'audio/webm' }); new Audio(URL.createObjectURL(b)).play(); }

        window.onload = init;
    </script>
</body>
</html>
