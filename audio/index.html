<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monered Voice Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #141417;
            --indigo-primary: #6366f1;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            overflow: hidden; 
            height: 100vh;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .studio-card {
            background: linear-gradient(145deg, #1a1a1e, #141417);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        .hardware-btn {
            background: #1a1a1e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hardware-btn:active {
            transform: scale(0.92);
            background: #141417;
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            background: var(--indigo-primary);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .record-outer {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .record-inner {
            width: 72px;
            height: 72px;
            background: #ef4444;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .recording .record-inner {
            border-radius: 14px;
            transform: scale(0.5);
            background: #ff0000;
        }

        .recording .record-outer {
            border-color: #ef4444;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .view-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .modal-blur {
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="app" class="relative">
        <!-- Global Loader -->
        <div id="loader" class="hidden fixed inset-0 z-[100] flex items-center justify-center modal-blur">
            <div class="text-center">
                <div class="w-10 h-10 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p id="loader-text" class="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400">Syncing</p>
            </div>
        </div>

        <!-- Home View -->
        <div id="view-home" class="view-container p-6 pt-12">
            <header class="mb-10 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter">MONERED</h1>
                    <div id="connection-status" class="flex items-center gap-2 mt-1">
                        <div id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
                        <span class="text-[9px] font-black uppercase tracking-widest text-slate-500">Checking Server...</span>
                    </div>
                </div>
                <button onclick="openNewBookModal()" class="w-12 h-12 hardware-btn rounded-full flex items-center justify-center border border-white/5">
                    <i class="fas fa-plus text-indigo-400"></i>
                </button>
            </header>
            
            <div id="book-list" class="flex-1 overflow-y-auto scrollbar-hide space-y-4"></div>
        </div>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="hidden view-container p-6">
            <header class="flex items-center justify-between py-4 mb-8">
                <button onclick="showView('home')" class="w-10 h-10 hardware-btn rounded-full flex items-center justify-center"><i class="fas fa-chevron-left text-xs"></i></button>
                <h2 id="dash-title" class="text-xs font-black italic uppercase tracking-widest text-slate-400">PROJECT</h2>
                <button onclick="openExportModal()" class="w-10 h-10 hardware-btn rounded-full flex items-center justify-center"><i class="fas fa-download text-indigo-400 text-xs"></i></button>
            </header>

            <div class="flex-1 overflow-y-auto scrollbar-hide space-y-8">
                <section>
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-[0.25em] mb-4 block">SELECT CHARACTER</label>
                    <div id="cast-list" class="grid grid-cols-2 gap-3"></div>
                </section>
                <section>
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-[0.25em] mb-4 block">SELECT CHAPTER</label>
                    <div id="chapter-list" class="space-y-3"></div>
                </section>
            </div>

            <div class="py-6">
                <button id="studio-btn" disabled onclick="enterStudio()" class="w-full py-6 rounded-[2.5rem] bg-indigo-600 font-black italic tracking-tighter text-xl disabled:opacity-20 transition-all active:scale-95 shadow-2xl shadow-indigo-900/30">
                    ENTER STUDIO
                </button>
            </div>
        </div>

        <!-- Studio View -->
        <div id="view-studio" class="hidden view-container bg-black p-6">
            <header class="flex items-center justify-between py-6">
                <button onclick="showView('dashboard')" class="text-slate-700 hover:text-white transition-colors"><i class="fas fa-times fa-lg"></i></button>
                <div class="text-center">
                    <p id="st-chap" class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-0.5">CHAPTER I</p>
                    <p id="st-scene" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">SCENE 1.1</p>
                </div>
                <div class="w-6"></div>
            </header>

            <div class="flex-1 flex flex-col items-center justify-center">
                <p id="st-char" class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em] mb-10">CHARACTER NAME</p>
                
                <div class="studio-card w-full min-h-[320px] p-8 flex items-center justify-center text-center relative overflow-hidden">
                    <p id="st-text" class="text-2xl font-bold leading-snug text-white/95 tracking-tight"></p>
                </div>

                <div class="w-full px-10 mt-12 mb-12">
                    <div class="progress-track">
                        <div id="st-progress" class="progress-bar"></div>
                    </div>
                </div>

                <div class="flex flex-col items-center gap-6">
                    <div id="record-trigger" onclick="toggleRecording()" class="record-outer cursor-pointer active:scale-95 transition-transform">
                        <div class="record-inner"></div>
                    </div>
                    <p id="rec-status" class="text-[9px] font-black tracking-[0.5em] text-slate-600 uppercase">STANDBY</p>
                </div>
            </div>

            <footer class="flex justify-between items-center py-8">
                <button onclick="prevPart()" class="w-16 h-16 hardware-btn rounded-full flex items-center justify-center border border-white/5">
                    <i class="fas fa-chevron-left text-slate-400"></i>
                </button>
                <button onclick="nextPart()" class="w-16 h-16 hardware-btn rounded-full flex items-center justify-center border border-white/5">
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </button>
            </footer>
        </div>

        <!-- Modals -->
        <div id="modal-new" class="hidden fixed inset-0 z-[90] modal-blur flex items-center justify-center p-6">
            <div class="bg-[#151518] w-full max-w-sm rounded-[3rem] p-8 border border-white/5">
                <h3 class="text-xl font-black italic tracking-tighter mb-6">NEW PROJECT</h3>
                <input type="text" id="in-title" placeholder="Project Name" class="w-full bg-black/60 border border-white/5 rounded-2xl p-4 mb-4 outline-none focus:border-indigo-500 font-bold text-sm">
                <textarea id="in-text" placeholder="Paste script here..." class="w-full h-40 bg-black/60 border border-white/5 rounded-2xl p-4 mb-6 outline-none focus:border-indigo-500 resize-none text-xs font-medium leading-relaxed"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeModals()" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500">Cancel</button>
                    <button onclick="saveNewProject()" class="flex-1 py-4 bg-indigo-600 rounded-2xl text-[10px] font-black uppercase tracking-widest">Create</button>
                </div>
            </div>
        </div>

        <div id="modal-export" class="hidden fixed inset-0 z-[90] modal-blur flex items-center justify-center p-6">
            <div class="bg-[#151518] w-full max-w-sm rounded-[3rem] p-8 border border-white/5 text-center">
                <h3 class="text-xl font-black italic tracking-tighter mb-8">EXPORT AUDIO (MP3)</h3>
                <div class="space-y-3">
                    <button onclick="runExport('full')" class="w-full py-4 bg-white/5 rounded-2xl font-bold text-xs flex justify-between px-6 items-center"><span>Full .ZIP</span> <i class="fas fa-download opacity-20"></i></button>
                    <button onclick="runExport('character')" class="w-full py-4 bg-white/5 rounded-2xl font-bold text-xs flex justify-between px-6 items-center"><span id="exp-char-label">Character</span> <i class="fas fa-user opacity-20"></i></button>
                    <button onclick="runExport('chapter')" class="w-full py-4 bg-white/5 rounded-2xl font-bold text-xs flex justify-between px-6 items-center"><span id="exp-chap-label">Chapter</span> <i class="fas fa-book opacity-20"></i></button>
                </div>
                <button onclick="closeModals()" class="mt-6 text-[10px] font-black text-slate-600 uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://habile-lissa-phytogenic.ngrok-free.dev/"; 
        
        let state = {
            books: [],
            activeBook: null,
            selectedChar: null,
            selectedChap: null,
            currentIndex: 0,
            mediaRecorder: null,
            chunks: [],
            isRecording: false
        };

        async function syncToPi() {
            try {
                await fetch(BACKEND_URL + "/save_projects", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ books: state.books })
                });
            } catch (e) { console.warn("Offline Sync"); }
        }

        async function loadFromPi() {
            const dot = document.getElementById('connection-dot');
            try {
                const res = await fetch(BACKEND_URL + "/get_projects", { headers: {'ngrok-skip-browser-warning': 'true'} });
                if(res.ok) {
                    const data = await res.json();
                    state.books = data.books || [];
                    renderHome();
                    dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                    document.querySelector('#connection-status span').innerText = "System Online";
                }
            } catch (e) { 
                dot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
                document.querySelector('#connection-status span').innerText = "System Offline";
            }
        }

        function renderHome() {
            const list = document.getElementById('book-list');
            list.innerHTML = state.books.length ? state.books.map((b, i) => `
                <div onclick="openBook(${i})" class="bg-[#151518] p-6 rounded-[2.5rem] border border-white/5 flex items-center justify-between active:scale-95 transition-all">
                    <div>
                        <h4 class="font-black italic text-lg tracking-tight uppercase">${b.title}</h4>
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">${b.chapters.length} Chapters • ${b.characters.length} Cast</p>
                    </div>
                    <i class="fas fa-chevron-right text-slate-800"></i>
                </div>
            `).join('') : '<div class="h-40 flex items-center justify-center text-slate-700 font-bold uppercase tracking-widest text-[10px]">No Projects Found</div>';
        }

        function openBook(i) {
            state.activeBook = state.books[i];
            document.getElementById('dash-title').innerText = state.activeBook.title;
            state.selectedChar = null; state.selectedChap = null;
            
            document.getElementById('cast-list').innerHTML = state.activeBook.characters.map(c => `
                <button onclick="selectChar('${c}')" id="c-${c}" class="p-4 rounded-2xl hardware-btn border border-white/5 text-slate-500 font-bold text-[11px] text-left transition-all truncate">${c}</button>
            `).join('');
            
            document.getElementById('chapter-list').innerHTML = state.activeBook.chapters.map((c, idx) => `
                <button onclick="selectChap(${idx})" id="ch-${idx}" class="w-full p-5 rounded-[1.5rem] hardware-btn border border-white/5 text-left font-bold text-slate-500 flex justify-between items-center">
                    <span class="text-sm">${c.title}</span>
                    <span class="text-[9px] text-slate-700 uppercase">${c.parts.length} lines</span>
                </button>
            `).join('');
            
            checkStudioBtn();
            showView('dashboard');
        }

        function selectChar(c) {
            state.selectedChar = c;
            document.querySelectorAll('[id^="c-"]').forEach(el => el.className = "p-4 rounded-2xl hardware-btn border border-white/5 text-slate-500 font-bold text-[11px] text-left transition-all truncate");
            document.getElementById('c-'+c).className = "p-4 rounded-2xl bg-indigo-600 border-indigo-400 text-white font-bold text-[11px] text-left shadow-lg shadow-indigo-900/40 truncate";
            checkStudioBtn();
        }

        function selectChap(i) {
            state.selectedChap = state.activeBook.chapters[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.className = "w-full p-5 rounded-[1.5rem] hardware-btn border border-white/5 text-left font-bold text-slate-500 flex justify-between items-center");
            document.getElementById('ch-'+i).className = "w-full p-5 rounded-[1.5rem] bg-white/5 border-white/10 text-white text-left font-bold flex justify-between items-center";
            checkStudioBtn();
        }

        function checkStudioBtn() { document.getElementById('studio-btn').disabled = !state.selectedChar || !state.selectedChap; }

        function enterStudio() {
            state.currentIndex = 0;
            renderPart();
            showView('studio');
        }

        function renderPart() {
            const filteredLines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            const part = filteredLines[state.currentIndex];
            if(!part) { showView('dashboard'); return; }
            document.getElementById('st-chap').innerText = state.selectedChap.title;
            document.getElementById('st-scene').innerText = part.scene || "DYNAMIC";
            document.getElementById('st-char').innerText = part.character;
            document.getElementById('st-text').innerText = part.text;
            const progress = ((state.currentIndex + 1) / filteredLines.length) * 100;
            document.getElementById('st-progress').style.width = progress + "%";
        }

        async function toggleRecording() {
            const container = document.getElementById('view-studio');
            const status = document.getElementById('rec-status');
            if (state.isRecording) {
                state.mediaRecorder.stop();
                state.isRecording = false;
                container.classList.remove('recording');
                status.innerText = "ENCODING...";
                setLoader(true, "Encoding MP3 on Pi");
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    state.mediaRecorder = new MediaRecorder(stream);
                    state.chunks = [];
                    state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
                    state.mediaRecorder.onstop = uploadRecording;
                    state.mediaRecorder.start();
                    state.isRecording = true;
                    container.classList.add('recording');
                    status.innerText = "RECORDING";
                } catch(e) { alert("Microphone access required."); }
            }
        }

        async function uploadRecording() {
            const blob = new Blob(state.chunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', blob);
            formData.append('book_title', state.activeBook.title);
            const filtered = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            const part = filtered[state.currentIndex];
            const name = `${state.selectedChap.title.replace(/\s+/g, '_')}_Part${state.currentIndex + 1}_${part.character}.webm`;
            formData.append('filename', name);
            
            try {
                const res = await fetch(BACKEND_URL + "/upload_audio", { 
                    method: 'POST', body: formData, headers: {'ngrok-skip-browser-warning': 'true'} 
                });
                if(res.ok) {
                    setLoader(false);
                    nextPart();
                }
            } catch(e) { 
                setLoader(false); 
                alert("Encoding failed. Check Pi ffmpeg."); 
            }
        }

        function nextPart() {
            const filteredLines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            if (state.currentIndex < filteredLines.length - 1) {
                state.currentIndex++;
                renderPart();
                document.getElementById('rec-status').innerText = "STANDBY";
            } else {
                alert("Chapter Completed!");
                showView('dashboard');
            }
        }

        function prevPart() {
            if(state.currentIndex > 0) {
                state.currentIndex--;
                renderPart();
                document.getElementById('rec-status').innerText = "STANDBY";
            }
        }

        function openExportModal() {
            document.getElementById('exp-char-label').innerText = state.selectedChar || 'Char Only';
            document.getElementById('exp-chap-label').innerText = state.selectedChap?.title || 'Chap Only';
            document.getElementById('modal-export').classList.remove('hidden');
        }

        async function runExport(type) {
            let url = `${BACKEND_URL}/export?book=${state.activeBook.title}`;
            if (type === 'character' && state.selectedChar) url += `&type=character&value=${state.selectedChar}`;
            if (type === 'chapter' && state.selectedChap) url += `&type=chapter&value=${state.selectedChap.title}`;
            window.open(url, '_blank');
            closeModals();
        }

        function showView(id) {
            ['home', 'dashboard', 'studio'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }
        function openNewBookModal() { document.getElementById('modal-new').classList.remove('hidden'); }
        function closeModals() { document.querySelectorAll('.modal-blur').forEach(m => m.classList.add('hidden')); }
        function setLoader(s, t = "Syncing") { 
            const l = document.getElementById('loader');
            document.getElementById('loader-text').innerText = t;
            if(s) l.classList.remove('hidden'); else l.classList.add('hidden');
        }

        function saveNewProject() {
            const title = document.getElementById('in-title').value;
            const text = document.getElementById('in-text').value;
            if(!title || !text) return;
            state.books.push(parseScript(text, title));
            syncToPi(); renderHome(); closeModals();
        }

        function parseScript(text, title) {
            const lines = text.split('\n');
            let book = { title, chapters: [], characters: new Set() };
            let currentChap = null;
            let currentScene = "1.1";
            lines.forEach(line => {
                const t = line.trim();
                if (!t) return;
                if (t.toUpperCase().startsWith('CHAPTER')) {
                    currentChap = { title: t, parts: [] };
                    book.chapters.push(currentChap);
                } else if (t.toUpperCase().startsWith('SCENE')) {
                    currentScene = t.split(':')[0].trim();
                } else if (t.includes(':')) {
                    const [charPart, ...dialogue] = t.split(':');
                    const cleanChar = charPart.split('(')[0].trim().toUpperCase();
                    const text = dialogue.join(':').trim();
                    if (cleanChar && currentChap && text && !cleanChar.startsWith('SOUND') && !cleanChar.startsWith('SFX')) {
                        book.characters.add(cleanChar);
                        currentChap.parts.push({ character: cleanChar, scene: currentScene, text: text });
                    }
                }
            });
            book.characters = Array.from(book.characters).sort();
            return book;
        }

        loadFromPi();
        setInterval(loadFromPi, 15000);
    </script>
</body>
</html>
