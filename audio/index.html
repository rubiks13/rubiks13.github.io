<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monered Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #08080a; 
            color: white; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .text-fluid-lg { font-size: clamp(1.2rem, 5vw, 1.8rem); }

        .card { 
            background: linear-gradient(145deg, #16161a, #0f0f12);
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid rgba(255,255,255,0.06); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .studio-nav {
            width: 65px; height: 65px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .studio-nav:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        .script-box {
            background: rgba(255,255,255,0.03);
            border-radius: 35px;
            padding: 40px 25px;
            width: 100%;
            min-height: 220px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 20px rgba(0,0,0,0.5);
        }

        .action-btn {
            width: 100%;
            padding: 24px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-rec { background: #ef4444; box-shadow: 0 0 40px rgba(239, 68, 68, 0.2); }
        .btn-stop { background: #ffffff; color: black; }
        
        .loader-spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- GLOBAL LOADER -->
    <div id="global-loader" class="hidden fixed inset-0 z-[2000] bg-black/70 backdrop-blur-md flex flex-col items-center justify-center">
        <div class="w-14 h-14 border-[5px] border-white/5 border-t-indigo-500 rounded-full loader-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-indigo-400">Syncing with Pi...</p>
    </div>

    <!-- VIEW: HOME -->
    <div id="view-home" class="p-6 max-w-xl mx-auto min-h-screen pb-32">
        <header class="flex justify-between items-center pt-8 pb-12">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">MONERED</h1>
                <p class="text-[9px] font-black opacity-30 uppercase tracking-[0.3em] mt-1">Professional Studio</p>
            </div>
            <button onclick="openModal('modal-new')" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-plus"></i></button>
        </header>
        <div id="book-list" class="space-y-4"></div>
    </div>

    <!-- VIEW: DASHBOARD -->
    <div id="view-dashboard" class="hidden p-6 max-w-xl mx-auto min-h-screen pb-32">
        <header class="flex justify-between items-center py-8">
            <button onclick="showView('home')" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10"><i class="fas fa-chevron-left"></i></button>
            <h2 id="dash-title" class="font-black italic text-lg uppercase tracking-tight">Project Name</h2>
            <button onclick="openModal('modal-export')" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-indigo-600/10 text-indigo-400 border border-indigo-500/20"><i class="fas fa-cloud-arrow-down"></i></button>
        </header>

        <div class="space-y-8">
            <div class="grid grid-cols-2 gap-4">
                <div class="card text-center">
                    <span id="stat-lines" class="text-3xl font-black italic text-indigo-500">0</span>
                    <p class="text-[9px] font-black opacity-30 uppercase tracking-widest mt-2">Script Lines</p>
                </div>
                <div class="card text-center">
                    <span id="stat-cast" class="text-3xl font-black italic">0</span>
                    <p class="text-[9px] font-black opacity-30 uppercase tracking-widest mt-2">Cast Members</p>
                </div>
            </div>

            <section>
                <div class="flex justify-between items-end mb-4 px-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400">Select Cast</label>
                    <span class="text-[9px] opacity-20 uppercase">Step 1</span>
                </div>
                <div id="cast-list" class="grid grid-cols-2 gap-3"></div>
            </section>

            <section id="chapter-section" class="opacity-10 pointer-events-none transition-all duration-500">
                <div class="flex justify-between items-end mb-4 px-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400">Select Section</label>
                    <span class="text-[9px] opacity-20 uppercase">Step 2</span>
                </div>
                <div id="chapter-list" class="space-y-3"></div>
            </section>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-[#08080a] via-[#08080a] to-transparent">
            <button id="studio-btn" disabled onclick="enterStudio()" class="w-full py-6 bg-indigo-600 rounded-[32px] font-black italic text-xl shadow-2xl disabled:opacity-10 disabled:grayscale transition-all active:scale-95">LAUNCH STUDIO</button>
        </div>
    </div>

    <!-- VIEW: STUDIO -->
    <div id="view-studio" class="hidden fixed inset-0 z-50 flex flex-col bg-[#003399]">
        <div class="flex justify-between items-center px-6 py-10">
            <button onclick="prevPart()" class="studio-nav"><i class="fas fa-chevron-left"></i></button>
            <div class="text-center flex-1 px-4 overflow-hidden">
                <div id="st-char" class="text-xl font-black uppercase tracking-tighter truncate">CHARACTER</div>
                <div id="st-chap" class="text-[10px] font-bold opacity-40 uppercase tracking-widest truncate">Chapter Title</div>
            </div>
            <button onclick="nextPart()" class="studio-nav !bg-green-500/20 !border-green-500/30"><i class="fas fa-chevron-right text-green-400"></i></button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center p-6 relative">
            <div id="st-progress" class="absolute top-0 text-[10px] font-black opacity-30 uppercase tracking-[0.4em]">Line 1 of 1</div>
            <div class="script-box">
                <p id="st-text" class="text-fluid-lg leading-tight">...</p>
            </div>
            <div class="mt-8 h-12 flex items-center justify-center">
                <button id="btn-review" onclick="playbackExisting()" class="hidden bg-white/10 backdrop-blur-xl border border-white/10 px-8 py-3 rounded-full font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-3 active:scale-90">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Review Take
                </button>
            </div>
        </div>

        <div class="bg-black/20 backdrop-blur-2xl p-10 pb-16 flex flex-col items-center gap-10 rounded-t-[60px] border-t border-white/5">
            <div class="flex items-center gap-8">
                <button onclick="exitStudio()" class="text-[10px] font-black opacity-30 uppercase tracking-widest hover:opacity-100 transition-opacity">Close</button>
                <div class="h-4 w-px bg-white/10"></div>
                <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black opacity-40 uppercase tracking-widest">Auto Advance</span>
                    <div id="auto-toggle" onclick="toggleAuto()" class="w-10 h-5 bg-white/10 rounded-full relative transition-colors cursor-pointer">
                        <div class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition-all"></div>
                    </div>
                </div>
            </div>
            <button id="rec-btn" onclick="toggleRecording()" class="action-btn btn-rec">Start Recording</button>
        </div>
    </div>

    <!-- MODAL: NEW PROJECT -->
    <div id="modal-new" class="hidden modal-overlay">
        <div class="bg-[#141417] w-full max-w-lg rounded-[45px] p-10 border border-white/5">
            <h3 class="text-2xl font-black italic mb-8 uppercase tracking-tighter">New Project</h3>
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Book Title" class="w-full bg-black rounded-3xl p-6 outline-none font-bold border border-white/5 focus:border-indigo-500/50 transition-colors">
                <textarea id="in-text" placeholder="PASTE SCRIPT HERE...&#10;&#10;CHAPTER 1 or SCENE 1&#10;HEIDI: Hello!&#10;PETER: Hi there!" class="w-full h-56 bg-black rounded-3xl p-6 outline-none resize-none text-sm border border-white/5 focus:border-indigo-500/50 transition-colors"></textarea>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModals()" class="flex-1 py-5 opacity-40 font-black text-[11px] uppercase tracking-widest">Cancel</button>
                <button onclick="saveProject()" class="flex-1 py-5 bg-indigo-600 rounded-[28px] font-black text-[11px] uppercase tracking-widest shadow-xl shadow-indigo-900/20">Create Project</button>
            </div>
        </div>
    </div>

    <!-- MODAL: EXPORT -->
    <div id="modal-export" class="hidden modal-overlay">
        <div class="bg-[#141417] w-full max-w-md rounded-[45px] p-10 border border-white/5 text-center">
            <div class="w-20 h-20 bg-indigo-600/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-file-zipper text-3xl text-indigo-400"></i>
            </div>
            <h3 class="text-xl font-black italic mb-2 uppercase">Export Studio</h3>
            <p class="text-xs opacity-40 mb-10 px-4">Download all processed high-quality voice takes to your device.</p>
            <div class="space-y-3">
                <button onclick="runExport('full')" class="w-full py-5 bg-white/5 rounded-3xl font-bold flex justify-between px-8 items-center border border-white/5">
                    <span class="text-sm">Full Project ZIP</span> <i class="fas fa-box-open opacity-30"></i>
                </button>
                <button onclick="runExport('char')" class="w-full py-5 bg-white/5 rounded-3xl font-bold flex justify-between px-8 items-center border border-white/5">
                    <span id="export-char-label" class="text-sm">Character ZIP</span> <i class="fas fa-user-tag opacity-30"></i>
                </button>
            </div>
            <button onclick="closeModals()" class="mt-10 opacity-30 text-[10px] font-black uppercase tracking-[0.3em]">Go Back</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://habile-lissa-phytogenic.ngrok-free.dev";
        let state = {
            books: [], activeBook: null, selectedChar: null, selectedChap: null,
            currentIndex: 0, isRecording: false, mediaRecorder: null, chunks: [],
            autoAdvance: true, currentAudioFile: null
        };

        const setLoader = (show) => document.getElementById('global-loader').classList.toggle('hidden', !show);

        async function init() {
            setLoader(true);
            try {
                const res = await fetch(BACKEND_URL + "/get_projects", { headers: {'ngrok-skip-browser-warning': 'true'} });
                const data = await res.json();
                state.books = data.books || [];
                renderHome();
            } catch (e) { console.error("Pi Connection Error"); }
            setLoader(false);
        }

        function renderHome() {
            const list = document.getElementById('book-list');
            list.innerHTML = state.books.map((b, i) => `
                <div class="card flex justify-between items-center group active:scale-95 transition-transform" onclick="openBook(${i})">
                    <div class="flex-1 overflow-hidden pr-4">
                        <h4 class="font-black italic text-lg uppercase truncate tracking-tight">${b.title}</h4>
                        <div class="flex gap-3 mt-1 opacity-30 font-black text-[8px] uppercase tracking-widest">
                            <span>${b.chapters.length} Sections</span>
                            <span>${b.characters.length} Cast</span>
                        </div>
                    </div>
                    <button onclick="deleteBook(event, ${i})" class="w-10 h-10 flex items-center justify-center text-white/10 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('') || `<div class="text-center py-32 opacity-10 font-black uppercase text-[10px] tracking-[0.5em]">No Studio Projects</div>`;
        }

        function openBook(i) {
            state.activeBook = state.books[i];
            state.selectedChar = null; state.selectedChap = null;
            document.getElementById('dash-title').innerText = state.activeBook.title;
            document.getElementById('stat-cast').innerText = state.activeBook.characters.length;
            let totalLines = 0;
            state.activeBook.chapters.forEach(ch => totalLines += ch.parts.length);
            document.getElementById('stat-lines').innerText = totalLines;
            document.getElementById('cast-list').innerHTML = state.activeBook.characters.map(c => `
                <button onclick="selectChar('${c}')" id="c-${c}" class="card !p-4 text-left bg-white/[0.03] transition-all">
                    <h5 class="text-[10px] font-black uppercase truncate text-white/40">${c}</h5>
                </button>
            `).join('');
            document.getElementById('chapter-section').classList.add('opacity-10', 'pointer-events-none');
            showView('dashboard');
        }

        function selectChar(c) {
            state.selectedChar = c;
            document.getElementById('export-char-label').innerText = `Export ${c} Only`;
            document.querySelectorAll('[id^="c-"]').forEach(el => {
                el.className = "card !p-4 text-left bg-white/[0.03] transition-all";
                el.querySelector('h5').className = "text-[10px] font-black uppercase truncate text-white/40";
            });
            const active = document.getElementById('c-'+c);
            active.className = "card !p-4 text-left bg-indigo-600 border-indigo-400 shadow-xl shadow-indigo-600/20 scale-[1.05]";
            active.querySelector('h5').className = "text-[10px] font-black uppercase truncate text-white";
            const available = state.activeBook.chapters.map((ch, idx) => {
                const count = ch.parts.filter(p => p.character === c).length;
                return count > 0 ? { ch, idx, count } : null;
            }).filter(x => x);
            document.getElementById('chapter-list').innerHTML = available.map(item => `
                <button onclick="selectChap(${item.idx})" id="ch-${item.idx}" class="w-full card flex justify-between items-center text-sm font-bold border-white/5 active:scale-95 transition-transform">
                    <span class="truncate pr-4">${item.ch.title}</span>
                    <span class="text-[9px] font-black opacity-30 uppercase whitespace-nowrap">${item.count} Lines</span>
                </button>
            `).join('');
            document.getElementById('chapter-section').classList.remove('opacity-10', 'pointer-events-none');
            checkStudioReady();
        }

        function selectChap(i) {
            state.selectedChap = state.activeBook.chapters[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.className = "w-full card flex justify-between items-center text-sm font-bold border-white/5");
            document.getElementById('ch-'+i).className = "w-full card flex justify-between items-center text-sm font-bold bg-white/10 border-white/20";
            checkStudioReady();
        }

        function checkStudioReady() { document.getElementById('studio-btn').disabled = !state.selectedChar || !state.selectedChap; }

        function toggleAuto() {
            state.autoAdvance = !state.autoAdvance;
            const toggle = document.getElementById('auto-toggle');
            toggle.classList.toggle('bg-indigo-600', state.autoAdvance);
            toggle.querySelector('div').style.left = state.autoAdvance ? '22px' : '2px';
        }

        function enterStudio() { state.currentIndex = 0; renderStudioPart(); showView('studio'); }

        async function renderStudioPart() {
            const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
            if (!lines[state.currentIndex]) return;
            const part = lines[state.currentIndex];
            document.getElementById('st-char').innerText = part.character;
            document.getElementById('st-chap').innerText = state.selectedChap.title;
            document.getElementById('st-text').innerText = part.text;
            document.getElementById('st-progress').innerText = `Line ${state.currentIndex + 1} of ${lines.length}`;
            const filename = `${state.selectedChap.title}_${state.currentIndex + 1}_${part.character}.mp3`;
            const res = await fetch(`${BACKEND_URL}/check_file?book=${state.activeBook.title}&filename=${filename}`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            const data = await res.json();
            state.currentAudioFile = data.exists ? data.filename : null;
            document.getElementById('btn-review').classList.toggle('hidden', !data.exists);
        }

        async function toggleRecording() {
            const btn = document.getElementById('rec-btn');
            if (state.isRecording) {
                state.mediaRecorder.stop();
                state.isRecording = false;
                btn.innerText = "Processing...";
                btn.disabled = true;
                btn.className = "action-btn opacity-50";
            } else {
                // IMPROVED AUDIO SETTINGS: Disable all filters for raw professional sound
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        channelCount: 1,
                        sampleRate: 48000
                    } 
                });
                
                // Increase bitrate to maximum (audio/webm usually defaults very low)
                const options = { audioBitsPerSecond : 128000 };
                state.mediaRecorder = new MediaRecorder(stream, options);
                
                state.chunks = [];
                state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
                state.mediaRecorder.onstop = saveRecording;
                state.mediaRecorder.start();
                state.isRecording = true;
                btn.innerText = "Tap to Finish";
                btn.className = "action-btn btn-stop";
            }
        }

        async function saveRecording() {
            setLoader(true);
            const blob = new Blob(state.chunks, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append('audio', blob);
            fd.append('book_title', state.activeBook.title);
            fd.append('filename', `${state.selectedChap.title}_${state.currentIndex + 1}_${state.selectedChar}.webm`);
            try {
                await fetch(BACKEND_URL + "/upload_audio", { method: 'POST', body: fd, headers: {'ngrok-skip-browser-warning': 'true'} });
                if (state.autoAdvance) {
                    const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar);
                    if (state.currentIndex < lines.length - 1) { state.currentIndex++; renderStudioPart(); }
                    else { alert("Section Complete!"); exitStudio(); }
                } else { renderStudioPart(); }
            } catch (e) { alert("Pi Connection Failed"); }
            const btn = document.getElementById('rec-btn');
            btn.disabled = false; btn.innerText = "Start Recording"; btn.className = "action-btn btn-rec";
            setLoader(false);
        }

        function playbackExisting() {
            if (!state.currentAudioFile) return;
            new Audio(`${BACKEND_URL}/stream_audio?book=${state.activeBook.title}&filename=${state.currentAudioFile}`).play();
        }

        async function saveProject() {
            const title = document.getElementById('in-title').value;
            const text = document.getElementById('in-text').value;
            if(!title || !text) return;
            setLoader(true);
            const lines = text.split('\n');
            let book = { title, chapters: [], characters: new Set() };
            let currentSection = null;
            lines.forEach(l => {
                const t = l.trim();
                if(!t) return;
                const upper = t.toUpperCase();
                // Recognize BOTH Chapter and Scene as triggers
                if(upper.startsWith('CHAPTER') || upper.startsWith('SCENE')) {
                    currentSection = { title: t, parts: [] };
                    book.chapters.push(currentSection);
                } else if(t.includes(':')) {
                    const [c, ...d] = t.split(':');
                    const char = c.trim().toUpperCase();
                    // Fallback to create a default section if none exists
                    if(!currentSection) {
                        currentSection = { title: "Section 1", parts: [] };
                        book.chapters.push(currentSection);
                    }
                    book.characters.add(char);
                    currentSection.parts.push({ character: char, text: d.join(':').trim() });
                }
            });
            book.characters = Array.from(book.characters).sort();
            state.books.push(book);
            await fetch(BACKEND_URL + "/save_projects", { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, 
                body: JSON.stringify({ books: state.books }) 
            });
            renderHome(); closeModals(); setLoader(false);
        }

        async function deleteBook(e, i) {
            e.stopPropagation();
            if(!confirm("Delete project?")) return;
            setLoader(true);
            await fetch(BACKEND_URL + "/delete_project", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: state.books[i].title }) });
            state.books.splice(i, 1);
            await fetch(BACKEND_URL + "/save_projects", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ books: state.books }) });
            renderHome(); setLoader(false);
        }

        function exitStudio() { showView('dashboard'); }
        function nextPart() { const lines = state.selectedChap.parts.filter(p => p.character === state.selectedChar); if(state.currentIndex < lines.length - 1) { state.currentIndex++; renderStudioPart(); } }
        function prevPart() { if(state.currentIndex > 0) { state.currentIndex--; renderStudioPart(); } }
        function showView(id) {
            ['home', 'dashboard', 'studio'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden')); }
        function runExport(type) {
            let url = `${BACKEND_URL}/export?book=${state.activeBook.title}`;
            if (type === 'char') url += `&character=${state.selectedChar}`;
            window.open(url, '_blank');
        }
        init();
    </script>
</body>
</html>
