<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Cube Illustrator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        canvas { display: block; }
        .ui-layer { pointer-events: none; position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .ui-layer * { pointer-events: auto; }
        .color-dot { width: 40px; height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: all 0.2s; position: relative; }
        .color-dot.active { border-color: white; transform: translateY(-4px); box-shadow: 0 4px 12px rgba(255,255,255,0.3); }
        .color-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #999; text-transform: uppercase; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="flex justify-between items-start">
            <div class="bg-black/50 p-4 rounded-xl backdrop-blur-md border border-white/10">
                <h1 class="text-white font-bold text-lg">3x3 Diagram Creator</h1>
                <p class="text-gray-400 text-xs">Fixed View: Tap to color faces</p>
                <div class="mt-3 flex gap-2">
                    <button onclick="resetToStandard()" class="text-[10px] bg-blue-600/40 hover:bg-blue-600/60 text-white px-3 py-1.5 rounded border border-blue-400/30 transition-colors">Full Color</button>
                    <button onclick="resetToGray()" class="text-[10px] bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded border border-white/10 transition-colors">Reset to Gray</button>
                </div>
            </div>
            <button onclick="handleDownload()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-full font-bold shadow-lg transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export PNG
            </button>
        </div>

        <div class="flex justify-center mb-8">
            <div class="bg-black/80 p-4 rounded-2xl backdrop-blur-xl border border-white/10 flex gap-4" id="palette">
                <!-- Colors injected by JS -->
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, cubeGroup;
        let selectedColor = '#ffffff';
        
        // Diagram Colors
        const paletteColors = [
            { hex: '#ffffff', name: 'White' },
            { hex: '#ffff00', name: 'Yellow' },
            { hex: '#00ff00', name: 'Green' },
            { hex: '#0000ff', name: 'Blue' },
            { hex: '#ff0000', name: 'Red' },
            { hex: '#ff8800', name: 'Orange' },
            { hex: '#808080', name: 'Gray' }
        ];

        const standardFaceColors = [0xff0000, 0xff8800, 0xffffff, 0xffff00, 0x00ff00, 0x0000ff];
        const DIAGRAM_GRAY = 0x808080;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Angle adjusted to match the isometric-style reference
            camera.position.set(7.5, 6.5, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            cubeGroup = new THREE.Group();
            createRubiksCube();
            scene.add(cubeGroup);

            // Bright, flat lighting to mimic the diagram style
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            setupUI();
            setupEventListeners();
            animate();
        }

        function createRubiksCube() {
            const spacing = 1.04; // Increased spacing for thicker black "lines"
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const geometry = new THREE.BoxGeometry(1, 1, 1);
                        const materials = [];
                        
                        for(let i=0; i<6; i++) {
                            // Default to gray for the diagram style
                            materials.push(new THREE.MeshLambertMaterial({ 
                                color: DIAGRAM_GRAY
                            }));
                        }
                        
                        const cubie = new THREE.Mesh(geometry, materials);
                        cubie.position.set(x * spacing, y * spacing, z * spacing);
                        
                        // Thicker black outline for each cubie
                        const edges = new THREE.EdgesGeometry(geometry);
                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
                        cubie.add(line);
                        
                        cubie.userData = { gridX: x, gridY: y, gridZ: z };
                        cubeGroup.add(cubie);
                    }
                }
            }
        }

        function setupUI() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            paletteColors.forEach((colorObj, index) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${colorObj.hex === selectedColor ? 'active' : ''}`;
                dot.style.backgroundColor = colorObj.hex;
                
                const label = document.createElement('span');
                label.className = 'color-label';
                label.innerText = colorObj.name;
                dot.appendChild(label);

                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    selectedColor = colorObj.hex;
                };
                palette.appendChild(dot);
            });
        }

        function setupEventListeners() {
            const canvas = renderer.domElement;
            canvas.addEventListener('click', (e) => handlePointerClick(e.clientX, e.clientY));
            canvas.addEventListener('touchend', (e) => {
                const touch = e.changedTouches[0];
                handlePointerClick(touch.clientX, touch.clientY);
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function handlePointerClick(x, y) {
            const mouse = new THREE.Vector2();
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(cubeGroup.children);
            if (intersects.length > 0) {
                const hit = intersects[0];
                const cubie = hit.object;
                const faceIndex = hit.face.materialIndex;
                cubie.material[faceIndex].color.set(selectedColor);
            }
        }

        function resetToGray() {
            cubeGroup.children.forEach(cubie => {
                cubie.material.forEach(mat => mat.color.set(DIAGRAM_GRAY));
            });
        }

        function resetToStandard() {
            cubeGroup.children.forEach(cubie => {
                const { gridX, gridY, gridZ } = cubie.userData;
                cubie.material.forEach((mat, i) => {
                    let color = DIAGRAM_GRAY;
                    if (i === 0 && gridX === 1) color = standardFaceColors[0];
                    if (i === 1 && gridX === -1) color = standardFaceColors[1];
                    if (i === 2 && gridY === 1) color = standardFaceColors[2];
                    if (i === 3 && gridY === -1) color = standardFaceColors[3];
                    if (i === 4 && z === 1) color = standardFaceColors[4]; // Fix for Front
                    if (i === 4 && gridZ === 1) color = standardFaceColors[4];
                    if (i === 5 && gridZ === -1) color = standardFaceColors[5];
                    mat.color.set(color);
                });
            });
        }

        function handleDownload() {
            renderer.render(scene, camera);
            try {
                const dataURL = renderer.domElement.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `cube-diagram-${Date.now()}.png`;
                link.href = dataURL;
                link.click();
            } catch (err) {
                console.error("Export failed", err);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
