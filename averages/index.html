<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Average Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
        }
        .input-card {
            transition: transform 0.2s;
        }
        .input-card:focus-within {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-indigo-600 uppercase tracking-tight">Super Average</h1>
            <p class="text-slate-500 text-sm">Enter your 6 "Average of 5" scores</p>
        </div>

        <!-- Inputs Grid -->
        <div id="inputContainer" class="grid grid-cols-2 gap-4 mb-8">
            <!-- Inputs will be generated here -->
        </div>

        <!-- Result Display -->
        <div id="resultBox" class="bg-indigo-600 rounded-2xl p-6 text-center text-white mb-6 hidden">
            <p class="text-indigo-200 text-xs font-bold uppercase mb-1">Final Result</p>
            <div id="superAverageDisplay" class="text-4xl font-black tracking-tighter">0.00</div>
        </div>

        <!-- Actions -->
        <div class="space-y-3">
            <button onclick="calculateSuperAverage()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                Calculate Now
            </button>
            <button onclick="resetData()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-xl transition-all">
                Clear All
            </button>
        </div>
    </div>

    <script>
        // Generate the 6 input fields automatically
        const container = document.getElementById('inputContainer');
        for (let i = 1; i <= 6; i++) {
            const div = document.createElement('div');
            div.className = 'input-card bg-slate-50 p-3 rounded-xl border border-slate-200';
            div.innerHTML = `
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Avg #${i}</label>
                <input type="number" step="0.01" class="avg-input w-full bg-transparent border-none text-lg font-mono font-bold text-slate-700 focus:outline-none" placeholder="0.00">
            `;
            container.appendChild(div);
        }

        function calculateSuperAverage() {
            const inputs = document.querySelectorAll('.avg-input');
            const resultBox = document.getElementById('resultBox');
            const display = document.getElementById('superAverageDisplay');
            
            let sum = 0;
            let count = 0;

            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) {
                    sum += val;
                    count++;
                }
            });

            if (count === 6) {
                const finalAvg = (sum / 6).toFixed(2);
                display.innerText = finalAvg + 's';
                resultBox.classList.remove('hidden');
            } else {
                // Custom message box instead of alert
                showError(`Please enter all 6 averages. (${count}/6 filled)`);
            }
        }

        function resetData() {
            const inputs = document.querySelectorAll('.avg-input');
            inputs.forEach(input => input.value = '');
            document.getElementById('resultBox').classList.add('hidden');
        }

        function showError(msg) {
            const resultBox = document.getElementById('resultBox');
            const display = document.getElementById('superAverageDisplay');
            display.innerText = "!!!";
            resultBox.classList.remove('hidden');
            setTimeout(() => {
                if(display.innerText === "!!!") resultBox.classList.add('hidden');
            }, 2000);
            console.log(msg);
        }
    </script>
</body>
</html>
